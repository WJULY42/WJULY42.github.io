<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools | lunarHope</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        space: { 900: '#010409', 800: '#0d1117', 700: '#161b22', 600: '#21262d', border: '#30363d', text: '#f0f6fc', muted: '#8b949e' },
                        glow: { purple: '#8957e5', blue: '#58a6ff', pink: '#da3633', green: '#3fb950', yellow: '#d29922' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #010409; color: #f0f6fc; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: #010409; } ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        
        .spotlight-card { position: relative; background: #0d1117; border: 1px solid #30363d; overflow: hidden; transition: all 0.3s ease; cursor: pointer; }
        .spotlight-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(88, 166, 255, 0.15), transparent 40%); z-index: 0; opacity: 0; transition: opacity 0.3s; }
        .spotlight-card:hover::before { opacity: 1; }
        .spotlight-card:hover { border-color: rgba(88, 166, 255, 0.5); transform: translateY(-4px); }
        .spotlight-card > * { position: relative; z-index: 1; }
        
        .text-gradient { background: linear-gradient(135deg, #58a6ff 0%, #8957e5 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }
        
        .swr-indicator { position: fixed; bottom: 20px; right: 20px; z-index: 100; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-family: 'JetBrains Mono', monospace; backdrop-filter: blur(8px); transition: all 0.3s ease; opacity: 0; transform: translateY(10px); pointer-events: none; }
        .swr-indicator.show { opacity: 1; transform: translateY(0); }
        .swr-loading { background: rgba(88, 166, 255, 0.2); border: 1px solid rgba(88, 166, 255, 0.5); color: #58a6ff; }
        .swr-updated { background: rgba(63, 185, 80, 0.2); border: 1px solid rgba(63, 185, 80, 0.5); color: #3fb950; }
        .swr-cached { background: rgba(139, 148, 158, 0.2); border: 1px solid rgba(139, 148, 158, 0.3); color: #8b949e; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .card-enter { animation: slideIn 0.4s ease-out forwards; }
        
        .create-btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(63, 185, 80, 0.1); border: 1px solid rgba(63, 185, 80, 0.4);
            color: #3fb950; border-radius: 0.375rem;
            font-size: 0.875rem; font-weight: 500; transition: all 0.2s;
        }
        .create-btn:hover { background: rgba(63, 185, 80, 0.2); border-color: #3fb950; box-shadow: 0 0 20px rgba(63, 185, 80, 0.2); }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute bottom-[-10%] right-[-5%] w-[600px] h-[600px] bg-glow-blue/10 rounded-full blur-[120px]"></div>
        <div class="absolute inset-0 bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:24px_24px] [mask-image:radial-gradient(ellipse_80%_50%_at_50%_0%,#000_70%,transparent_110%)]"></div>
    </div>

    <div id="boot-overlay" class="fixed inset-0 z-[200] bg-space-900/95 backdrop-blur-md hidden flex-col items-center justify-center font-mono">
        <div class="text-glow-green text-4xl mb-6 animate-pulse">></div>
        <p id="boot-text" class="text-space-text text-xl mb-8">Initializing System...</p>
        <div class="w-64 h-1.5 bg-space-700 rounded-full overflow-hidden">
            <div id="boot-progress" class="h-full bg-glow-green w-0 transition-all duration-1000 ease-linear"></div>
        </div>
    </div>

    <div id="swr-indicator" class="swr-indicator"></div>

    <!-- Nav（无 Create 按钮） -->
    <header class="fixed top-0 w-full z-50 bg-space-900/80 backdrop-blur-md border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="flex items-center space-x-2 font-mono font-bold text-lg text-space-text">
                <svg class="w-6 h-6 text-glow-purple" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                <span>lunarHope</span>
            </a>
            <nav class="hidden md:flex items-center space-x-8 text-sm font-medium">
                <a href="/tools/" class="text-space-text border-b-2 border-glow-blue pb-1 transition">Tools</a>
                <a href="/blog/" class="text-space-muted hover:text-space-text transition">Blog</a>
                <a href="/#guestbook" class="text-space-muted hover:text-space-text transition">Guestbook</a>
            </nav>
        </div>
    </header>

    <!-- Hero（保留 Create 按钮） -->
    <section class="relative z-10 pt-32 pb-12 px-6 border-b border-space-border">
        <div class="max-w-7xl mx-auto reveal active flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
            <div>
                <h1 class="text-4xl md:text-5xl font-bold text-gradient mb-4">Tinkerer's Workbench</h1>
                <p class="text-space-muted text-lg max-w-2xl">A collection of scripts, utilities, and web toys. Click an app to boot.</p>
            </div>
            <a href="/publish.html?type=tool" class="create-btn flex-shrink-0">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                <span>New Tool</span>
            </a>
        </div>
        <div class="max-w-7xl mx-auto mt-4 flex items-center gap-2 text-xs text-space-muted font-mono">
            <span class="w-2 h-2 rounded-full bg-glow-green animate-pulse"></span>
            <span id="cache-status-text">Loading...</span>
        </div>
    </section>

    <main class="relative z-10 max-w-7xl mx-auto px-6 py-12">
        <div id="tools-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <footer class="relative z-10 border-t border-space-border mt-12 py-8 text-center text-xs text-space-muted">
        <p>&copy; 2026 lunarHope. Built with ❤️ and Tailwind CSS. <span class="text-space-muted/50">Powered by SWR</span></p>
    </footer>

    <script>
        // ==================== SWR 缓存引擎 ====================
        class SWRCache {
            constructor(key, ttl = 30000) { this.key = `swr_${key}`; this.ttl = ttl; }
            read() { try { const raw = localStorage.getItem(this.key); return raw ? JSON.parse(raw) : null; } catch { return null; } }
            write(data, etag) { try { localStorage.setItem(this.key, JSON.stringify({ data, etag, timestamp: Date.now() })); } catch {} }
            isFresh() { const c = this.read(); return c && (Date.now() - c.timestamp) < this.ttl; }
        }

        const indicator = document.getElementById('swr-indicator');
        function showIndicator(msg, type = 'cached') {
            indicator.textContent = msg;
            indicator.className = `swr-indicator show swr-${type}`;
            clearTimeout(indicator._timer);
            indicator._timer = setTimeout(() => indicator.classList.remove('show'), 2500);
        }

        async function swrFetch(url, cacheKey, options = {}) {
            const cache = new SWRCache(cacheKey, options.ttl || 30000);
            const cached = cache.read();
            if (cached) options.onCache?.(cached.data, cached.timestamp);
            if (cached && cache.isFresh() && !options.force) { options.onFresh?.(); return { data: cached.data, fromCache: true }; }
            try {
                options.onRevalidating?.();
                const headers = { 'Accept': 'application/json' };
                if (cached?.etag) headers['If-None-Match'] = cached.etag;
                const res = await fetch(url, { headers, cache: 'no-store' });
                if (res.status === 304) { cache.write(cached.data, cached.etag); options.onNotModified?.(); return { data: cached.data, fromCache: true }; }
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const newData = await res.json();
                const newEtag = res.headers.get('ETag');
                const hasChanged = !cached || JSON.stringify(cached.data) !== JSON.stringify(newData);
                cache.write(newData, newEtag);
                if (hasChanged) options.onUpdate?.(newData, cached?.data);
                return { data: newData, fromCache: false, changed: hasChanged };
            } catch (err) {
                options.onError?.(err);
                if (cached) return { data: cached.data, fromCache: true, stale: true };
                throw err;
            }
        }

        // ==================== 页面逻辑 ====================
        const gridContainer = document.getElementById('tools-grid');
        const cacheStatusText = document.getElementById('cache-status-text');
        const obs = new IntersectionObserver((entries) => { entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('active'); }); }, { threshold: 0.1 });

        function bootTool(tool) {
            const overlay = document.getElementById('boot-overlay');
            const text = document.getElementById('boot-text');
            const progress = document.getElementById('boot-progress');
            overlay.classList.remove('hidden'); overlay.classList.add('flex');
            text.textContent = `Booting ${tool.name} ${tool.emoji || ''}...`;
            progress.style.width = '0%';
            setTimeout(() => { progress.style.width = '100%'; }, 100);
            setTimeout(() => {
                window.location.href = `/view.html?type=tool&app=${tool.url}`;
            }, 1200);
        }

        function createToolCard(tool, index) {
            const card = document.createElement('div');
            card.className = 'spotlight-card rounded-xl p-6 reveal block';
            card.dataset.toolId = tool.url || tool.name;
            card.style.transitionDelay = `${index * 80}ms`;
            card.innerHTML = `
                <div class="text-5xl mb-4">${tool.emoji || '🛠️'}</div>
                <h3 class="text-xl font-bold text-space-text mb-2">${tool.name}</h3>
                <p class="text-space-muted text-sm flex-grow mb-6">${tool.desc}</p>
                <div class="flex items-center justify-between text-xs text-space-muted pt-4 border-t border-space-border">
                    <span class="flex items-center">
                        <span class="w-2.5 h-2.5 rounded-full bg-green-500 mr-2"></span> 
                        ${tool.status || 'Ready'}
                    </span>
                    <span class="text-glow-blue flex items-center font-bold">
                        Launch <svg class="w-3 h-3 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </span>
                </div>
            `;
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                card.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
                card.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
            });
            card.onclick = () => bootTool(tool);
            return card;
        }

        function renderAll(tools) {
            gridContainer.innerHTML = '';
            tools.forEach((tool, index) => {
                const card = createToolCard(tool, index);
                gridContainer.appendChild(card);
                obs.observe(card);
            });
        }

        function diffUpdate(newTools, oldTools) {
            const oldMap = new Map((oldTools || []).map(t => [t.url || t.name, t]));
            const newMap = new Map(newTools.map(t => [t.url || t.name, t]));
            let added = 0, removed = 0, updated = 0;

            newTools.forEach((tool, index) => {
                const id = tool.url || tool.name;
                const oldCard = gridContainer.querySelector(`[data-tool-id="${CSS.escape(id)}"]`);
                if (!oldCard) {
                    const card = createToolCard(tool, index);
                    card.classList.add('card-enter');
                    gridContainer.appendChild(card);
                    obs.observe(card);
                    added++;
                } else if (JSON.stringify(oldMap.get(id)) !== JSON.stringify(tool)) {
                    const newCard = createToolCard(tool, index);
                    oldCard.replaceWith(newCard);
                    obs.observe(newCard);
                    updated++;
                }
            });

            (oldTools || []).forEach(tool => {
                const id = tool.url || tool.name;
                if (!newMap.has(id)) {
                    const oldCard = gridContainer.querySelector(`[data-tool-id="${CSS.escape(id)}"]`);
                    if (oldCard) {
                        oldCard.style.transition = 'all 0.3s';
                        oldCard.style.opacity = '0';
                        oldCard.style.transform = 'scale(0.9)';
                        setTimeout(() => oldCard.remove(), 300);
                        removed++;
                    }
                }
            });
            return { added, removed, updated };
        }

        let previousTools = null;

        async function initTools() {
            await swrFetch('/data/tools.json', 'tools_index', {
                ttl: 60000,
                onCache: (data, timestamp) => {
                    const tools = Array.isArray(data) ? data : (data.tools || []);
                    previousTools = tools;
                    renderAll(tools);
                    const age = Math.round((Date.now() - timestamp) / 1000);
                    cacheStatusText.textContent = `Cached ${age}s ago`;
                    showIndicator(`⚡ Loaded from cache (${age}s ago)`, 'cached');
                },
                onFresh: () => {},
                onRevalidating: () => {
                    cacheStatusText.textContent = 'Syncing...';
                    showIndicator('🔄 Checking for updates...', 'loading');
                },
                onNotModified: () => {
                    cacheStatusText.textContent = 'Up to date';
                    showIndicator('✓ Already up to date', 'cached');
                },
                onUpdate: (newData, oldData) => {
                    const newTools = Array.isArray(newData) ? newData : (newData.tools || []);
                    const stats = diffUpdate(newTools, previousTools);
                    previousTools = newTools;
                    cacheStatusText.textContent = 'Updated just now';
                    const msg = [];
                    if (stats.added) msg.push(`${stats.added} added`);
                    if (stats.updated) msg.push(`${stats.updated} updated`);
                    if (stats.removed) msg.push(`${stats.removed} removed`);
                    showIndicator(`✨ ${msg.join(', ') || 'Refreshed'}`, 'updated');
                },
                onError: (err) => {
                    console.error('SWR Error:', err);
                    showIndicator('⚠️ Network error, using cache', 'cached');
                }
            });
        }

        initTools();
        document.addEventListener('visibilitychange', () => { if (!document.hidden) initTools(); });
    </script>
</body>
</html>
