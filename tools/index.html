<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tools | lunarHope</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    body { background-color: #010409; color: #c9d1d9; font-family: 'Inter', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    .text-gradient {
      background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .spotlight-card {
      position: relative;
      background: rgba(22, 27, 34, 0.6);
      border: 1px solid rgba(48, 54, 61, 0.6);
      transition: all 0.3s ease;
      overflow: hidden;
      cursor: pointer;
    }
    .spotlight-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(
        600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
        rgba(88, 166, 255, 0.06),
        transparent 40%
      );
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .spotlight-card:hover::before { opacity: 1; }
    .spotlight-card:hover {
      border-color: rgba(88, 166, 255, 0.3);
      transform: translateY(-2px);
    }
    .glow-blue { color: #58a6ff; }
    .glow-purple { color: #bc8cff; }
    .text-space-muted { color: #8b949e; }
    .text-space-text { color: #c9d1d9; }
    .border-space-border { border-color: #30363d; }

    /* Boot Overlay */
    #boot-overlay {
      position: fixed; inset: 0;
      background: #010409;
      z-index: 100;
      display: none;
      align-items: center; justify-content: center;
      flex-direction: column;
    }
    #boot-overlay.active { display: flex; }
    .boot-text {
      font-family: 'JetBrains Mono', monospace;
      color: #58a6ff;
      font-size: 14px;
    }
    .boot-progress {
      width: 300px; height: 4px;
      background: #30363d;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 20px;
    }
    .boot-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #58a6ff, #bc8cff);
      width: 0%;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body class="min-h-screen">
  <!-- Navigation -->
  <nav class="fixed top-0 left-0 right-0 z-40 backdrop-blur-md bg-[#010409]/80 border-b border-[#30363d]">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="/" class="text-xl font-bold text-gradient">lunarHope</a>
      <div class="flex gap-6 text-sm">
        <a href="/" class="text-space-muted hover:text-space-text transition">Home</a>
        <a href="/blog" class="text-space-muted hover:text-space-text transition">Blog</a>
        <a href="/tools" class="glow-blue font-medium">Tools</a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-6xl mx-auto px-6 pt-32 pb-20">
    <div class="mb-12">
      <h1 class="text-4xl md:text-5xl font-bold mb-3 text-gradient">Tinkerer's Workbench</h1>
      <p class="text-space-muted font-mono">// small utilities, built for fun and focus</p>
    </div>

    <div id="tools-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <p class="text-space-muted font-mono col-span-full text-center">// Loading tools...</p>
    </div>
  </main>

  <!-- Boot Overlay -->
  <div id="boot-overlay">
    <div class="text-4xl mb-4" id="boot-emoji">🚀</div>
    <div class="boot-text" id="boot-text">Initializing...</div>
    <div class="boot-progress">
      <div class="boot-progress-bar" id="boot-bar"></div>
    </div>
  </div>

  <!-- Update Toast -->
  <div id="update-toast" class="fixed top-20 right-4 z-50 hidden">
    <div class="bg-purple-900/30 border border-purple-500/50 text-purple-400 px-4 py-2 rounded-lg font-mono text-sm backdrop-blur flex items-center gap-2 shadow-lg">
      <span class="w-2 h-2 bg-purple-400 rounded-full animate-pulse"></span>
      <span id="toast-text">工具列表已更新</span>
      <button onclick="location.reload()" class="ml-2 underline text-xs hover:text-purple-300">刷新</button>
    </div>
  </div>

  <script src="/assets/js/lunar-cache.js"></script>
  <script>
    const gridContainer = document.getElementById('tools-grid');
    const CACHE_KEY = 'tools_list';
    const DATA_URL = '/data/tools.json';

    function renderTools(tools) {
      gridContainer.innerHTML = '';

      const makerTool = {
        name: "Auto Tool Builder",
        desc: "Create and publish new tools directly from your browser. Fully automated.",
        url: "maker.html",
        emoji: "🛠️",
        status: "System",
        lang: "JS",
        langColor: "#f1e05a"
      };
      if (!tools.some(t => t.url === 'maker.html')) tools.unshift(makerTool);

      tools.forEach((tool, index) => {
        const card = document.createElement('div');
        card.className = 'spotlight-card rounded-xl p-6 reveal active block';
        card.style.transitionDelay = `${index * 80}ms`;
        card.innerHTML = `
          <div class="text-5xl mb-4">${tool.emoji || '🛠️'}</div>
          <h3 class="text-xl font-bold text-space-text mb-2">${tool.name}</h3>
          <p class="text-space-muted text-sm flex-grow mb-6">${tool.desc}</p>
          <div class="flex items-center justify-between text-xs text-space-muted pt-4 border-t border-space-border">
            <span class="flex items-center">
              <span class="w-2.5 h-2.5 rounded-full ${tool.status === 'System' ? 'bg-glow-purple' : 'bg-green-500'} mr-2"></span>
              ${tool.status || 'Ready'}
            </span>
            <span class="glow-blue flex items-center font-bold">
              Launch
              <svg class="w-3 h-3 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </span>
          </div>
        `;
        card.addEventListener('mousemove', (e) => {
          const rect = card.getBoundingClientRect();
          card.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
          card.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
        });
        card.onclick = () => bootTool(tool);
        gridContainer.appendChild(card);
      });
    }

    function showToast(text, autoHide = 4000) {
      const toast = document.getElementById('update-toast');
      document.getElementById('toast-text').textContent = text;
      toast.classList.remove('hidden');
      if (autoHide) setTimeout(() => toast.classList.add('hidden'), autoHide);
    }

    function bootTool(tool) {
      const overlay = document.getElementById('boot-overlay');
      const emoji = document.getElementById('boot-emoji');
      const text = document.getElementById('boot-text');
      const bar = document.getElementById('boot-bar');

      emoji.textContent = tool.emoji || '🚀';
      overlay.classList.add('active');

      const steps = [
        { msg: `Loading ${tool.name}...`, pct: 30 },
        { msg: 'Initializing runtime...', pct: 60 },
        { msg: 'Ready.', pct: 100 }
      ];

      let i = 0;
      const interval = setInterval(() => {
        if (i >= steps.length) {
          clearInterval(interval);
          setTimeout(() => {
            window.location.href = `/tools/use.html?app=${tool.url}`;
          }, 200);
          return;
        }
        text.textContent = steps[i].msg;
        bar.style.width = `${steps[i].pct}%`;
        i++;
      }, 300);
    }

    async function loadTools() {
      try {
        const result = await LunarCache.fetchWithSWR(DATA_URL, CACHE_KEY, {
          staleTime: 60000,
          revalidateTime: 300000
        });

        let tools = Array.isArray(result.data) ? result.data : (result.data.tools || []);
        renderTools(tools);

        if (result.fromCache && !result.fresh) {
          console.log('[Tools] 已使用缓存秒开，后台正在检查更新...');
        }

        window.addEventListener('lunar-data-updated', (e) => {
          if (e.detail.key === CACHE_KEY) {
            let freshTools = Array.isArray(e.detail.data) ? e.detail.data : (e.detail.data.tools || []);
            renderTools(freshTools);
            showToast('🛠️ 工具列表已更新');
          }
        });

      } catch (err) {
        gridContainer.innerHTML = `<p class="text-pink-400 col-span-full text-center font-mono">Error loading tools</p>`;
      }
    }

    loadTools();
  </script>
</body>
</html>
