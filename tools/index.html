<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools | lunarHope</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        space: { 900: '#010409', 800: '#0d1117', 700: '#161b22', 600: '#21262d', border: '#30363d', text: '#f0f6fc', muted: '#8b949e' },
                        glow: { purple: '#8957e5', blue: '#58a6ff', pink: '#da3633', green: '#3fb950', yellow: '#d29922' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #010409; color: #f0f6fc; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: #010409; } ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        .spotlight-card { position: relative; background: #0d1117; border: 1px solid #30363d; overflow: hidden; transition: all 0.3s ease; cursor: pointer; }
        .spotlight-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(88, 166, 255, 0.15), transparent 40%); z-index: 0; opacity: 0; transition: opacity 0.3s; }
        .spotlight-card:hover::before { opacity: 1; }
        .spotlight-card:hover { border-color: rgba(88, 166, 255, 0.5); transform: translateY(-4px); }
        .spotlight-card > * { position: relative; z-index: 1; }
        .text-gradient { background: linear-gradient(135deg, #58a6ff 0%, #8957e5 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="font-sans antialiased">

    <!-- 背景光影 -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute bottom-[-10%] right-[-5%] w-[600px] h-[600px] bg-glow-blue/10 rounded-full blur-[120px]"></div>
        <div class="absolute inset-0 bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:24px_24px] [mask-image:radial-gradient(ellipse_80%_50%_at_50%_0%,#000_70%,transparent_110%)]"></div>
    </div>

    <!-- 启动动画遮罩 -->
    <div id="boot-overlay" class="fixed inset-0 z-[200] bg-space-900/95 backdrop-blur-md hidden flex-col items-center justify-center font-mono">
        <div class="text-glow-green text-4xl mb-6 animate-pulse">></div>
        <p id="boot-text" class="text-space-text text-xl mb-8">Initializing System...</p>
        <div class="w-64 h-1.5 bg-space-700 rounded-full overflow-hidden">
            <div id="boot-progress" class="h-full bg-glow-green w-0 transition-all duration-1000 ease-linear"></div>
        </div>
    </div>

    <!-- Nav -->
    <header class="fixed top-0 w-full z-50 bg-space-900/80 backdrop-blur-md border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="flex items-center space-x-2 font-mono font-bold text-lg text-space-text">
                <svg class="w-6 h-6 text-glow-purple" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                <span>lunarHope</span>
            </a>
            <nav class="hidden md:flex items-center space-x-8 text-sm font-medium">
                <a href="/tools/" class="text-space-text border-b-2 border-glow-blue pb-1 transition">Tools</a>
                <a href="/blog/" class="text-space-muted hover:text-space-text transition">Blog</a>
                <a href="/#guestbook" class="text-space-muted hover:text-space-text transition">Guestbook</a>
                <!-- 新增：快捷创建工具入口 -->
                <a href="/publish.html?type=tool" class="text-glow-green hover:text-green-300 transition flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Create
                </a>
            </nav>
        </div>
    </header>

    <!-- Hero -->
    <section class="relative z-10 pt-32 pb-12 px-6 border-b border-space-border">
        <div class="max-w-7xl mx-auto reveal active">
            <h1 class="text-4xl md:text-5xl font-bold text-gradient mb-4">Tinkerer's Workbench</h1>
            <p class="text-space-muted text-lg max-w-2xl">A collection of scripts, utilities, and web toys. Click an app to boot.</p>
        </div>
    </section>

    <!-- Tools Grid -->
    <main class="relative z-10 max-w-7xl mx-auto px-6 py-12">
        <div id="tools-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <footer class="relative z-10 border-t border-space-border mt-12 py-8 text-center text-xs text-space-muted">
        <p>&copy; 2026 lunarHope. Built with ❤️ and Tailwind CSS.</p>
    </footer>

    <script>
        const gridContainer = document.getElementById('tools-grid');
        const obs = new IntersectionObserver((entries) => { entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('active'); }); }, { threshold: 0.1 });

        function bootTool(tool) {
            const overlay = document.getElementById('boot-overlay');
            const text = document.getElementById('boot-text');
            const progress = document.getElementById('boot-progress');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            text.textContent = `Booting ${tool.name} ${tool.emoji || ''}...`;
            progress.style.width = '0%';
            setTimeout(() => { progress.style.width = '100%'; }, 100);
            
            setTimeout(() => {
                // 核心路由逻辑
                if (tool.url === 'maker.html' || tool.isCreator) {
                    window.location.href = `/publish.html?type=tool`;
                } else {
                    window.location.href = `/tools/use.html?app=${tool.url}`;
                }
            }, 1200);
        }

        async function loadTools() {
            try {
                const response = await fetch('/data/tools.json');
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                let tools = Array.isArray(data) ? data : (data.tools || []);
                
                // 强制置顶 "Auto Tool Builder" (指向新的统一发布器)
                const makerTool = {
                    name: "Auto Tool Builder",
                    desc: "Create and publish new tools directly from your browser. Fully automated.",
                    url: "maker.html", // 保留标识符
                    isCreator: true,   // 新增标识
                    emoji: "🛠️",
                    status: "System",
                    lang: "JS",
                    langColor: "#f1e05a"
                };
                
                if (!tools.some(t => t.url === 'maker.html' || t.isCreator)) {
                    tools.unshift(makerTool);
                }

                gridContainer.innerHTML = '';
                tools.forEach((tool, index) => {
                    const card = document.createElement('div');
                    card.className = 'spotlight-card rounded-xl p-6 reveal block';
                    card.style.transitionDelay = `${index * 80}ms`;
                    card.innerHTML = `
                        <div class="text-5xl mb-4">${tool.emoji || '🛠️'}</div>
                        <h3 class="text-xl font-bold text-space-text mb-2">${tool.name}</h3>
                        <p class="text-space-muted text-sm flex-grow mb-6">${tool.desc}</p>
                        <div class="flex items-center justify-between text-xs text-space-muted pt-4 border-t border-space-border">
                            <span class="flex items-center">
                                <span class="w-2.5 h-2.5 rounded-full ${tool.status === 'System' ? 'bg-glow-purple' : 'bg-green-500'} mr-2"></span> 
                                ${tool.status || 'Ready'}
                            </span>
                            <span class="text-glow-blue flex items-center font-bold">
                                Launch <svg class="w-3 h-3 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </span>
                        </div>
                    `;
                    card.addEventListener('mousemove', (e) => {
                        const rect = card.getBoundingClientRect();
                        card.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
                        card.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
                    });
                    card.onclick = () => bootTool(tool);
                    gridContainer.appendChild(card);
                    obs.observe(card);
                });
            } catch (error) {
                gridContainer.innerHTML = `<p class="text-glow-pink col-span-full text-center font-mono">Error loading tools.json</p>`;
            }
        }
        loadTools();
    </script>
</body>
</html>
