<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Maker | lunarHope</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pinyin-pro"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        space: { 900: '#010409', 800: '#0d1117', 700: '#161b22', 600: '#21262d', border: '#30363d', text: '#f0f6fc', muted: '#8b949e' },
                        glow: { green: '#3fb950', blue: '#58a6ff', pink: '#da3633' }
                    },
                    fontFamily: { mono: ['"JetBrains Mono"', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #010409; color: #f0f6fc; }
        textarea { resize: none; }
    </style>
</head>
<body class="font-mono min-h-screen flex flex-col p-6">
    <header class="border-b border-space-border pb-4 mb-8 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-glow-blue">⚡ Auto Tool Builder</h1>
        <a href="/tools/" class="text-sm text-space-muted hover:text-space-text">Back to Workbench</a>
    </header>

    <main class="max-w-4xl mx-auto w-full grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="space-y-6">
            <div class="bg-space-800 border border-space-border rounded-lg p-6">
                <label class="block text-sm text-space-muted mb-2">Tool Name (Display Name)</label>
                <input type="text" id="tool-name" class="w-full bg-space-900 border border-space-border rounded p-3 text-space-text focus:border-glow-blue outline-none" placeholder="e.g., 超级计算器">
                <label class="block text-sm text-space-muted mt-4 mb-2">Emoji Icon</label>
                <input type="text" id="tool-emoji" class="w-full bg-space-900 border border-space-border rounded p-3 text-space-text focus:border-glow-blue outline-none" placeholder="e.g., 🧮">
                <label class="block text-sm text-space-muted mt-4 mb-2">Short Description</label>
                <input type="text" id="tool-desc" class="w-full bg-space-900 border border-space-border rounded p-3 text-space-text focus:border-glow-blue outline-none" placeholder="e.g., A powerful calculator for devs.">
                <label class="block text-sm text-space-muted mt-4 mb-2">Author (Publisher)</label>
                <input type="text" id="tool-author" class="w-full bg-space-900 border border-space-border rounded p-3 text-space-text focus:border-glow-blue outline-none" placeholder="lunarHope">
                <label class="block text-sm text-space-muted mt-4 mb-2">HTML Content</label>
                <textarea id="tool-content" rows="12" class="w-full bg-space-900 border border-space-border rounded p-4 text-space-text focus:border-glow-blue outline-none text-xs" placeholder="<div>Hello World</div>"></textarea>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-space-800 border border-space-border rounded-lg p-6">
                <label class="block text-xs text-space-muted mb-1">GitHub Token (repo scope)</label>
                <input type="password" id="gh-token" class="w-full bg-space-900 border border-space-border rounded p-2 text-xs text-space-text focus:border-glow-green outline-none" placeholder="ghp_xxxxxxxxxxxx">
                <button onclick="publishTool()" class="w-full mt-4 bg-glow-green/20 text-glow-green border border-glow-green/50 hover:bg-glow-green/30 py-3 rounded font-bold transition">
                    Auto Publish
                </button>
            </div>
            <div class="bg-black border border-space-border rounded-lg p-4 h-80 overflow-y-auto font-mono text-xs text-gray-400" id="terminal-log">
                <p class="text-glow-green">➜ ~ System ready.</p>
            </div>
        </div>
    </main>

    <script>
        function utf8ToBase64(str) { return btoa(unescape(encodeURIComponent(str))); }
        function base64ToUtf8(base64) { return decodeURIComponent(escape(atob(base64))); }

        function log(msg, type = 'info') {
            const term = document.getElementById('terminal-log');
            const p = document.createElement('p');
            p.className = type === 'error' ? 'text-glow-pink' : (type === 'success' ? 'text-glow-green' : 'text-gray-400');
            p.textContent = `> ${msg}`;
            term.appendChild(p);
            term.scrollTop = term.scrollHeight;
        }

        async function getFileSha(path, token) {
            try {
                const res = await fetch(`https://api.github.com/repos/WJULY42/WJULY42.github.io/contents/${path}`, { headers: { Authorization: `token ${token}` } });
                if (res.ok) return (await res.json()).sha;
            } catch (e) { return null; }
            return null;
        }

        async function publishTool() {
            const token = document.getElementById('gh-token').value.trim();
            const name = document.getElementById('tool-name').value.trim();
            const emoji = document.getElementById('tool-emoji').value.trim() || '🛠️';
            const desc = document.getElementById('tool-desc').value.trim();
            const author = document.getElementById('tool-author').value.trim() || 'lunarHope';
            const content = document.getElementById('tool-content').value;

            if (!token || !name || !content) { log('Error: Missing fields.', 'error'); return; }

            let slug = "";
            if (window.pinyinPro) {
                slug = window.pinyinPro.pinyin(name, { toneType: 'none', type: 'array' }).join('-');
            } else {
                slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
            }
            slug = slug.replace(/-+/g, '-').toLowerCase();
            if (!slug) slug = 'tool-' + Date.now();

            const fileName = `${slug}.html`;
            const path = `tools/${fileName}`;
            const jsonPath = `data/tools.json`;

            try {
                const fullContent = `<!--\nTool: ${name}\nAuthor: ${author}\nDate: ${new Date().toISOString().split('T')[0]}\n-->\n${content}`;
                const encodedHtml = utf8ToBase64(fullContent);

                log('Fetching tools index...', 'info');
                let tools = [];
                const currentJsonSha = await getFileSha(jsonPath, token);
                
                if (currentJsonSha) {
                    const jsonRes = await fetch(`https://api.github.com/repos/WJULY42/WJULY42.github.io/contents/${jsonPath}`, { headers: { Authorization: `token ${token}` } });
                    const jsonData = await jsonRes.json();
                    const decoded = base64ToUtf8(jsonData.content);
                    const parsed = JSON.parse(decoded);
                    tools = Array.isArray(parsed) ? parsed : (parsed.tools || []);
                    log(`Found ${tools.length} existing tools.`, 'info');
                }

                tools.unshift({
                    name: name,
                    desc: desc,
                    url: fileName,
                    emoji: emoji,
                    status: "Live",
                    lang: "HTML",
                    langColor: "#e34c26",
                    author: author
                });

                const newJsonContent = JSON.stringify({ tools: tools }, null, 2);
                const encodedJson = utf8ToBase64(newJsonContent);

                log('Pushing HTML file...', 'info');
                const htmlSha = await getFileSha(path, token);
                const htmlPayload = { message: `feat: create tool ${name} by ${author}`, content: encodedHtml, branch: 'main' };
                if (htmlSha) htmlPayload.sha = htmlSha;

                const htmlRes = await fetch(`https://api.github.com/repos/WJULY42/WJULY42.github.io/contents/${path}`, {
                    method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(htmlPayload)
                });
                if (!htmlRes.ok) throw new Error(`HTML Push Failed: ${await htmlRes.text()}`);
                log('HTML published.', 'success');

                log('Updating tools.json...', 'info');
                const jsonPayload = { message: `chore: add ${name} to index`, content: encodedJson, branch: 'main' };
                if (currentJsonSha) jsonPayload.sha = currentJsonSha;

                const jsonRes = await fetch(`https://api.github.com/repos/WJULY42/WJULY42.github.io/contents/${jsonPath}`, {
                    method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(jsonPayload)
                });
                if (!jsonRes.ok) throw new Error(`JSON Update Failed: ${await jsonRes.text()}`);
                
                log('🎉 All done! Tool is live in the workbench.', 'success');
            } catch (err) {
                log(`Critical Error: ${err.message}`, 'error');
            }
        }
    </script>
</body>
</html>
