<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="🧮 专注计算器 - 简洁高效，无干扰">
  <title>🧮 专注计算器 | LAN的工具箱</title>
  <style>
    /* ===== 复用番茄钟主题变量 ===== */
    :root {
      --primary: #6366f1; --primary-hover: #4f46e5; --primary-soft: #818cf8;
      --secondary: #64748b; --success: #22c55e; --warning: #f59e0b;
      --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b; --text-light: #64748b;
      --border: #e2e8f0; --shadow: 0 8px 30px rgb(0 0 0 / 0.12);
      --ring-bg: #f1f5f9; --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --radius: 20px; --radius-sm: 14px;
      --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a; --card-bg: #1e293b; --text: #f1f5f9;
        --text-light: #94a3b8; --border: #334155; --ring-bg: #334155;
        --shadow: 0 8px 30px rgb(0 0 0 / 0.4);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans); background: var(--bg); color: var(--text);
      line-height: 1.6; padding: 2rem; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
    }

    /* ===== 计算器容器 ===== */
    .calc-container {
      background: var(--card-bg); border-radius: var(--radius);
      padding: 2rem; max-width: 420px; width: 100%;
      box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .calc-header {
      text-align: center; margin-bottom: 1.5rem;
      font-size: 1.4rem; font-weight: 700; letter-spacing: -0.01em;
    }
    .calc-header span { opacity: 0.8; }

    /* ===== 显示屏 ===== */
    .display {
      background: var(--ring-bg); border-radius: var(--radius-sm);
      padding: 1.2rem; margin-bottom: 1.5rem; min-height: 110px;
      display: flex; flex-direction: column; justify-content: flex-end;
      align-items: flex-end; border: 1px solid var(--border);
      word-break: break-all;
    }
    .prev-operand {
      font-size: 1rem; color: var(--text-light); min-height: 1.5rem;
      font-family: var(--font-mono); opacity: 0.8;
    }
    .curr-operand {
      font-size: 2.8rem; font-weight: 700; font-family: var(--font-mono);
      color: var(--text); margin-top: 0.3rem; line-height: 1.2;
    }

    /* ===== 按钮网格 ===== */
    .btn-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.8rem;
    }
    .btn {
      aspect-ratio: 1.3; border: none; border-radius: var(--radius-sm);
      font-size: 1.25rem; font-weight: 600; cursor: pointer;
      transition: var(--transition); background: var(--ring-bg);
      color: var(--text); box-shadow: 0 2px 6px rgb(0 0 0 / 0.05);
      display: flex; align-items: center; justify-content: center;
      user-select: none; -webkit-tap-highlight-color: transparent;
    }
    .btn:hover { background: var(--border); transform: translateY(-2px); }
    .btn:active { transform: translateY(0); box-shadow: none; }
    .btn:focus-visible { outline: 2px solid var(--primary-soft); outline-offset: 2px; }

    .btn.operator { background: #e0e7ff; color: #4338ca; }
    .btn.operator:hover { background: #c7d2fe; }
    .btn.equals {
      grid-column: span 2; aspect-ratio: auto; padding: 0.9rem;
      background: var(--primary); color: white; box-shadow: 0 4px 14px rgb(99 102 241 / 0.4);
    }
    .btn.equals:hover { background: var(--primary-hover); box-shadow: 0 6px 20px rgb(99 102 241 / 0.6); }
    .btn.clear { background: #fee2e2; color: #b91c1c; }
    .btn.clear:hover { background: #fecaca; }
    .btn.delete { background: #fef3c7; color: #b45309; }
    .btn.delete:hover { background: #fde68a; }

    /* ===== 快捷键提示 ===== */
    .shortcut-hint {
      margin-top: 1.5rem; text-align: center; font-size: 0.85rem;
      color: var(--text-light); padding-top: 1rem;
      border-top: 1px dashed var(--border);
    }
    .shortcut-hint kbd {
      background: var(--ring-bg); border: 1px solid var(--border);
      border-radius: 4px; padding: 0.1rem 0.4rem; font-family: var(--font-mono);
      font-size: 0.8rem; box-shadow: 0 1px 2px rgb(0 0 0 / 0.05);
    }

    /* ===== 底部 & 响应式 ===== */
    .footer {
      grid-column: 1 / -1; margin-top: 1.5rem; padding-top: 1rem;
      border-top: 1px solid var(--border); text-align: center;
      font-size: 0.9rem; color: var(--text-light);
    }
    .footer a { color: var(--primary); text-decoration: none; font-weight: 500; }
    .footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      body { padding: 1rem; }
      .calc-container { padding: 1.5rem; border-radius: 16px; }
      .curr-operand { font-size: 2.2rem; }
      .btn { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

  <main class="calc-container">
    <header class="calc-header">🧮 专注计算器 <span>v1.0</span></header>

    <div class="display" aria-live="polite">
      <div class="prev-operand" id="prevOperand"></div>
      <div class="curr-operand" id="currOperand">0</div>
    </div>

    <div class="btn-grid">
      <button class="btn clear" data-action="clear">C</button>
      <button class="btn delete" data-action="delete">⌫</button>
      <button class="btn operator" data-action="operation" data-value="%">%</button>
      <button class="btn operator" data-action="operation" data-value="÷">÷</button>
      
      <button data-number>7</button>
      <button data-number>8</button>
      <button data-number>9</button>
      <button class="btn operator" data-action="operation" data-value="×">×</button>
      
      <button data-number>4</button>
      <button data-number>5</button>
      <button data-number>6</button>
      <button class="btn operator" data-action="operation" data-value="−">−</button>
      
      <button data-number>1</button>
      <button data-number>2</button>
      <button data-number>3</button>
      <button class="btn operator" data-action="operation" data-value="+">+</button>
      
      <button data-number class="span-2">0</button>
      <button data-number>.</button>
      <button class="btn equals" data-action="compute">=</button>
    </div>

    <div class="shortcut-hint">
      ⌨️ 快捷键：<kbd>Esc</kbd> 清空 · <kbd>⌫</kbd> 删除 · <kbd>Enter</kbd> 计算
    </div>

    <footer class="footer">
      <a href="../">← 返回工具集</a> · <a href="https://github.com/WJULY42" target="_blank">GitHub</a>
    </footer>
  </main>

  <script>
    class Calculator {
      constructor(prevEl, currEl) {
        this.prevEl = prevEl;
        this.currEl = currEl;
        this.clear();
      }
      clear() {
        this.curr = '0'; this.prev = ''; this.operation = undefined;
      }
      delete() {
        if (this.curr === '0' || this.curr === '') return;
        this.curr = this.curr.toString().slice(0, -1);
        if (this.curr === '' || this.curr === '-') this.curr = '0';
      }
      append(num) {
        if (num === '.' && this.curr.includes('.')) return;
        if (this.curr === '0' && num !== '.') this.curr = num.toString();
        else this.curr += num.toString();
      }
      chooseOp(op) {
        if (this.curr === '') return;
        if (this.prev !== '') this.compute();
        this.operation = op;
        this.prev = this.curr;
        this.curr = '';
      }
      compute() {
        let comp;
        const p = parseFloat(this.prev);
        const c = parseFloat(this.curr);
        if (isNaN(p) || isNaN(c)) return;
        switch (this.operation) {
          case '+': comp = p + c; break;
          case '−': comp = p - c; break;
          case '×': comp = p * c; break;
          case '÷': comp = c === 0 ? NaN : p / c; break;
          case '%': comp = (p % c); break;
          default: return;
        }
        // 处理浮点精度
        this.curr = Math.round(comp * 1e10) / 1e10;
        this.operation = undefined;
        this.prev = '';
      }
      getDisplayNum(num) {
        if (num === '') return '';
        const str = num.toString();
        const [int, dec] = str.split('.');
        const formatted = parseInt(int).toLocaleString('zh-CN', { maximumFractionDigits: 0 });
        return dec != null ? `${formatted}.${dec}` : formatted;
      }
      updateDisplay() {
        this.currEl.innerText = this.getDisplayNum(this.curr);
        if (this.operation != null) {
          this.prevEl.innerText = `${this.getDisplayNum(this.prev)} ${this.operation}`;
        } else {
          this.prevEl.innerText = '';
        }
      }
    }

    // ===== 初始化 =====
    const prevEl = document.getElementById('prevOperand');
    const currEl = document.getElementById('currOperand');
    const calc = new Calculator(prevEl, currEl);
    calc.updateDisplay();

    // 按钮事件
    document.querySelectorAll('[data-number]').forEach(btn => {
      btn.addEventListener('click', () => { calc.append(btn.innerText); calc.updateDisplay(); });
    });
    document.querySelectorAll('[data-action="operation"]').forEach(btn => {
      btn.addEventListener('click', () => { calc.chooseOp(btn.dataset.value); calc.updateDisplay(); });
    });
    document.querySelector('[data-action="compute"]').addEventListener('click', () => { calc.compute(); calc.updateDisplay(); });
    document.querySelector('[data-action="clear"]').addEventListener('click', () => { calc.clear(); calc.updateDisplay(); });
    document.querySelector('[data-action="delete"]').addEventListener('click', () => { calc.delete(); calc.updateDisplay(); });

    // 键盘支持（桌面端对齐番茄钟体验）
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      let handled = true;
      if (e.key >= '0' && e.key <= '9') calc.append(e.key);
      else if (e.key === '.') calc.append('.');
      else if (['+', '-', '*', '/'].includes(e.key)) {
        const map = { '+': '+', '-': '−', '*': '×', '/': '÷' };
        calc.chooseOp(map[e.key]);
      }
      else if (e.key === 'Enter' || e.key === '=') calc.compute();
      else if (e.key === 'Backspace') calc.delete();
      else if (e.key === 'Escape') calc.clear();
      else handled = false;

      if (handled) { e.preventDefault(); calc.updateDisplay(); }
    });
  </script>
</body>
</html>
