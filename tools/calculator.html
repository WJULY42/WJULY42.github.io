<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #f0f6fc; font-family: 'JetBrains Mono', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .calc-btn { transition: all 0.1s; }
        .calc-btn:active { transform: scale(0.95); }
        /* 隐藏滚动条 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="w-full max-w-sm bg-[#161b22] border border-[#30363d] rounded-xl p-6 shadow-2xl">
        <!-- 显示屏 -->
        <input type="text" id="display" readonly class="w-full bg-[#010409] border border-[#30363d] rounded-lg p-4 text-right text-2xl mb-4 text-[#58a6ff] outline-none font-mono" value="0">
        
        <!-- 键盘区 -->
        <div class="grid grid-cols-4 gap-3">
            <button onclick="clearDisplay()" class="col-span-2 bg-[#da3633]/20 text-[#da3633] border border-[#da3633]/50 rounded-lg p-3 font-bold hover:bg-[#da3633]/30">C</button>
            <button onclick="append('/')" class="bg-[#21262d] border border-[#30363d] rounded-lg p-3 hover:border-[#58a6ff]">÷</button>
            <button onclick="append('*')" class="bg-[#21262d] border border-[#30363d] rounded-lg p-3 hover:border-[#58a6ff]">×</button>
            
            <button onclick="append('7')" class="bg-[#21262d] border border-[#30363d] rounded-lg p-3 hover:bg-[#30363d]">7</button>
            <button onclick="append('8')" class="bg-[#21262d] border border-[#30363d] rounded-lg p-3 hover:bg-[#30363d]">8</button>
            <button onclick="append('9')" class="bg-[#21262d] border border-[#30363d] rounded-lg p-3 hover:bg-[#30363d]">9</button>
            <button onclick="append('-')" class="bg-[#21262d] border border-[#30363d] rounded-lg p-3 hover:border-[#58a6ff]">-</button>
            
            <button onclick="append('4')" class="bg-[#21262d] border border-[#30363d] rounded-lg p-3 hover:bg-[#30363d]">4</button>
            <button onclick="append('5')" class="bg-[#21262d] border border-[#30363d] rounded-lg p-3 hover:bg-[#30363d]">5</button>
            <button onclick="append('6')" class="bg-[#21262d] border border-[#30363d] rounded-lg p-3 hover:bg-[#30363d]">6</button>
            <button onclick="append('+')" class="bg-[#21262d] border border-[#30363d] rounded-lg p-3 hover:border-[#58a6ff]">+</button>
            
            <button onclick="append('1')" class="bg-[#21262d] border border-[#30363d] rounded-lg p-3 hover:bg-[#30363d]">1</button>
            <button onclick="append('2')" class="bg-[#21262d] border border-[#30363d] rounded-lg p-3 hover:bg-[#30363d]">2</button>
            <button onclick="append('3')" class="bg-[#21262d] border border-[#30363d] rounded-lg p-3 hover:bg-[#30363d]">3</button>
            <button onclick="calculate()" class="row-span-2 bg-[#238636] text-white border border-[#2ea043] rounded-lg p-3 font-bold hover:bg-[#2ea043]">=</button>
            
            <button onclick="append('0')" class="col-span-2 bg-[#21262d] border border-[#30363d] rounded-lg p-3 hover:bg-[#30363d]">0</button>
            <button onclick="append('.')" class="bg-[#21262d] border border-[#30363d] rounded-lg p-3 hover:bg-[#30363d]">.</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        function append(val) { if(display.value === '0') display.value = ''; display.value += val; }
        function clearDisplay() { display.value = '0'; }
        function calculate() { try { display.value = eval(display.value); } catch { display.value = 'Error'; } }
    </script>
</body>
</html>
