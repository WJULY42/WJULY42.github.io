<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Snake</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        canvas { border: 2px solid #30363d; border-radius: 8px; box-shadow: 0 0 20px rgba(88, 166, 255, 0.1); }
    </style>
</head>
<body>
    <canvas id="game" width="400" height="400" class="bg-[#161b22]"></canvas>
    <script>
        const ctx = document.getElementById('game').getContext('2d');
        let snake = [{x: 10, y: 10}], food = {x: 15, y: 15}, dx = 0, dy = 0;
        
        function draw() {
            ctx.fillStyle = '#161b22'; ctx.fillRect(0, 0, 400, 400);
            ctx.fillStyle = '#3fb950'; snake.forEach(s => ctx.fillRect(s.x*20, s.y*20, 18, 18));
            ctx.fillStyle = '#da3633'; ctx.fillRect(food.x*20, food.y*20, 18, 18);
        }
        
        function update() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20 || snake.some(s => s.x === head.x && s.y === head.y)) {
                dx = 0; dy = 0; snake = [{x: 10, y: 10}]; return;
            }
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) food = {x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20)};
            else snake.pop();
            draw();
        }
        
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' && dy !== 1) { dx = 0; dy = -1; }
            if (e.key === 'ArrowDown' && dy !== -1) { dx = 0; dy = 1; }
            if (e.key === 'ArrowLeft' && dx !== 1) { dx = -1; dy = 0; }
            if (e.key === 'ArrowRight' && dx !== -1) { dx = 1; dy = 0; }
        });
        
        setInterval(update, 150); draw();
    </script>
</body>
</html>
