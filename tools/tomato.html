<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="🍅 番茄时钟 - 专注工作，高效休息">
  <title>🍅 番茄时钟 | LAN的工具箱</title>
  <style>
    :root {
      --primary: #ef4444; --primary-hover: #dc2626; --secondary: #64748b;
      --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b; --text-light: #64748b;
      --border: #e2e8f0; --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --ring-bg: #f1f5f9; --transition: all 0.3s ease;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a; --card-bg: #1e293b; --text: #f1f5f9;
        --text-light: #94a3b8; --border: #334155; --ring-bg: #334155;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.6;
      padding: 1rem; min-height: 100vh; display: flex;
      align-items: center; justify-content: center; transition: var(--transition);
    }
    body[data-mode="work"] .ring-progress { stroke: var(--primary) !important; }
    body[data-mode="break"] .ring-progress { stroke: #22c55e !important; }
    body.timer-complete .ring-progress { animation: pulse 0.5s ease-in-out 3; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
    
    .tomato-container {
      background: var(--card-bg); border-radius: 16px; padding: 2rem;
      max-width: 420px; width: 100%; box-shadow: var(--shadow);
      text-align: center; border: 1px solid var(--border);
    }
    .header { margin-bottom: 1.5rem; }
    .header h1 { font-size: 1.5rem; margin-bottom: 0.3rem; }
    .header p { color: var(--text-light); font-size: 0.9rem; }
    
    .mode-toggle {
      display: flex; gap: 0.5rem; justify-content: center;
      margin-bottom: 1.5rem; background: var(--ring-bg);
      padding: 0.25rem; border-radius: 12px; inline-size: fit-content; margin-inline: auto;
    }
    .mode-btn {
      padding: 0.5rem 1.2rem; border: none; background: transparent;
      border-radius: 10px; cursor: pointer; font-weight: 500;
      color: var(--text-light); transition: var(--transition);
    }
    .mode-btn.active {
      background: var(--card-bg); color: var(--primary);
      box-shadow: 0 2px 4px rgb(0 0 0 / 0.1);
    }
    
    .timer-ring { width: 200px; height: 200px; margin: 1rem auto; display: block; }
    .ring-bg { stroke: var(--ring-bg); }
    .ring-progress {
      stroke: var(--primary); stroke-dasharray: 565.48; stroke-dashoffset: 0;
      stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
      transform: rotate(-90deg); transform-origin: 100px 100px;
    }
    .timer-text {
      dominant-baseline: middle; font-size: 2.2rem; font-weight: 600;
      font-family: monospace; fill: var(--text);
    }
    .timer-label { font-size: 0.9rem; fill: var(--text-light); opacity: 0.9; }
    
    .controls {
      display: flex; gap: 0.8rem; justify-content: center;
      margin: 1.5rem 0; flex-wrap: wrap;
    }
    .btn {
      padding: 0.7rem 1.5rem; border: none; border-radius: 10px;
      background: var(--primary); color: white; font-weight: 500;
      cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; gap: 0.4rem;
    }
    .btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-secondary { background: var(--secondary); }
    .btn-secondary:hover { background: #475569; }
    
    .status { min-height: 1.5rem; color: var(--text-light); font-size: 0.9rem; margin: 0.5rem 0; }
    .shortcut-hint { font-size: 0.8rem; color: var(--text-light); margin-top: 0.5rem; opacity: 0.8; }
    
    .settings-panel {
      margin-top: 1.5rem; text-align: left;
      border-top: 1px dashed var(--border); padding-top: 1rem;
    }
    .settings-panel summary {
      cursor: pointer; color: var(--primary); font-weight: 500;
      user-select: none; list-style: none;
    }
    .settings-content {
      padding: 1rem 0 0; display: grid; gap: 0.8rem; font-size: 0.9rem;
    }
    .settings-content label {
      display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
    }
    .settings-content input[type="number"] {
      width: 60px; padding: 0.3rem 0.5rem; border: 1px solid var(--border);
      border-radius: 6px; background: var(--bg); color: var(--text); text-align: center;
    }
    .settings-content input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
    
    .music-section {
      margin-top: 1.2rem; padding-top: 1rem;
      border-top: 1px dashed var(--border);
    }
    .music-title {
      font-weight: 500; margin-bottom: 0.8rem;
      display: flex; align-items: center; gap: 0.4rem; font-size: 0.95rem;
    }
    .music-options {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem; margin-bottom: 0.8rem;
    }
    .music-btn {
      padding: 0.4rem 0.6rem; border: 1px solid var(--border);
      border-radius: 8px; background: var(--bg); color: var(--text);
      font-size: 0.8rem; cursor: pointer; transition: var(--transition);
      text-align: center;
    }
    .music-btn:hover, .music-btn.active {
      background: var(--primary); color: white; border-color: var(--primary);
    }
    .music-controls {
      display: flex; align-items: center; gap: 0.8rem;
      justify-content: center; flex-wrap: wrap;
    }
    .volume-control {
      display: flex; align-items: center; gap: 0.4rem; font-size: 0.85rem;
    }
    .volume-control input { width: 80px; cursor: pointer; }
    .music-status {
      font-size: 0.8rem; color: var(--text-light);
      min-height: 1.2rem; margin-top: 0.3rem;
    }
    
    .footer {
      margin-top: 1.5rem; padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.85rem; color: var(--text-light);
    }
    .footer a { color: var(--primary); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    
    @media (max-width: 480px) {
      .tomato-container { padding: 1.5rem; }
      .timer-ring { width: 170px; height: 170px; }
      .timer-text { font-size: 1.8rem; }
      .controls { gap: 0.5rem; }
      .btn { padding: 0.6rem 1.2rem; font-size: 0.9rem; }
      .music-options { grid-template-columns: 1fr; }
    }
    
    .notification-banner {
      position: fixed; top: 0; left: 0; right: 0;
      background: var(--primary); color: white;
      padding: 0.8rem; text-align: center; font-size: 0.9rem;
      display: none; z-index: 100; box-shadow: 0 2px 8px rgb(0 0 0 / 0.15);
    }
    .notification-banner.show { display: flex; align-items: center; justify-content: center; gap: 1rem; }
    .notification-banner button {
      background: white; color: var(--primary); border: none;
      padding: 0.3rem 1rem; border-radius: 6px; cursor: pointer; font-weight: 500;
    }
  </style>
</head>
<body data-mode="work">

  <div class="notification-banner" id="notificationBanner">
    🔔 开启通知提醒，不错过专注时刻
    <button onclick="requestNotificationPermission()">允许通知</button>
    <button onclick="this.parentElement.classList.remove('show')" style="background:transparent;color:white;">✕</button>
  </div>

  <main class="tomato-container">
    <header class="header">
      <h1>🍅 番茄时钟</h1>
      <p>25 分钟专注 · 5 分钟休息</p>
    </header>

    <div class="mode-toggle" role="tablist" aria-label="计时模式">
      <button class="mode-btn active" data-mode="work" role="tab" aria-selected="true">🍅 工作</button>
      <button class="mode-btn" data-mode="break" role="tab" aria-selected="false">☕ 休息</button>
    </div>

    <svg class="timer-ring" viewBox="0 0 200 200" aria-label="倒计时进度">
      <circle class="ring-bg" cx="100" cy="100" r="90" fill="none" stroke-width="8"/>
      <circle class="ring-progress" cx="100" cy="100" r="90" fill="none" stroke-width="8" stroke-dasharray="565.48" stroke-linecap="round"/>
      <text class="timer-text" x="100" y="95" text-anchor="middle">25:00</text>
      <text class="timer-label" x="100" y="125" text-anchor="middle">准备中</text>
    </svg>

    <div class="controls">
      <button class="btn" id="startBtn" aria-label="开始计时">▶ 开始</button>
      <button class="btn btn-secondary" id="pauseBtn" disabled aria-label="暂停计时">⏸ 暂停</button>
      <button class="btn btn-secondary" id="resetBtn" aria-label="重置计时">🔄 重置</button>
    </div>

    <div class="status" id="statusText" aria-live="polite">准备开始专注～</div>
    <div class="shortcut-hint">快捷键：空格=开始/暂停 · R=重置 · W=工作 · B=休息</div>

    <details class="settings-panel">
      <summary>⚙️ 个性化设置</summary>
      <div class="settings-content">
        <label>🍅 工作时长（分钟）<input type="number" id="workDuration" min="1" max="120" value="25"></label>
        <label>☕ 休息时长（分钟）<input type="number" id="breakDuration" min="1" max="60" value="5"></label>
        <label><input type="checkbox" id="autoStart" checked> 自动开始下一轮</label>
        <label><input type="checkbox" id="soundEnabled" checked> 启用提示音</label>
        <button class="btn" onclick="saveSettings()" style="padding:0.4rem 1rem;font-size:0.9rem;">💾 保存设置</button>
      </div>
    </details>

    <div class="music-section">
      <div class="music-title">🎵 专注白噪音（纯前端生成）</div>
      <div class="music-options">
        <button class="music-btn active" data-sound="none">🔇 关闭</button>
        <button class="music-btn" data-sound="rain">🌧️ 雨声</button>
        <button class="music-btn" data-sound="forest">🌲 森林</button>
        <button class="music-btn" data-sound="cafe">☕ 咖啡馆</button>
        <button class="music-btn" data-sound="waves">🌊 海浪</button>
      </div>
      <div class="music-controls">
        <button class="btn btn-secondary" id="musicToggle">▶ 播放</button>
        <div class="volume-control">🔈 <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.3"></div>
      </div>
      <div class="music-status" id="musicStatus">💡 点击「播放」开始聆听（首次需点击激活）</div>
    </div>

    <footer class="footer">
      <p>💡 小技巧：每完成 4 个番茄钟，休息 15-30 分钟</p>
      <p style="margin-top:0.3rem">
        <a href="../" aria-label="返回工具集">← 返回工具集</a>
        · 
        <a href="https://github.com/WJULY42" target="_blank" rel="noopener">GitHub</a>
      </p>
    </footer>
  </main>

  <script>
    // ===== 全局状态 =====
    let timeLeft = 25 * 60, totalTime = 25 * 60, timerId = null, isRunning = false, currentMode = 'work';
    let settings = { work: 1500, break: 300, auto: true, sound: true };
    let currentSound = 'none', isMusicPlaying = false;
    let audioCtx = null, musicSource = null, musicGain = null, noiseBuffer = null;

    // ===== DOM 元素 =====
    const $ = id => document.getElementById(id);
    const timerText = document.querySelector('.timer-text');
    const timerLabel = document.querySelector('.timer-label');
    const ringProgress = document.querySelector('.ring-progress');
    const startBtn = $('startBtn'), pauseBtn = $('pauseBtn'), resetBtn = $('resetBtn');
    const statusText = $('statusText');
    const modeBtns = document.querySelectorAll('.mode-btn');
    const musicBtns = document.querySelectorAll('.music-btn');
    const musicToggle = $('musicToggle');
    const volumeSlider = $('volumeSlider');
    const musicStatus = $('musicStatus');
    const notificationBanner = $('notificationBanner');

    // ===== 初始化 =====
    document.addEventListener('DOMContentLoaded', () => {
      loadSettings();
      updateDisplay();
      setupEventListeners();
      checkNotificationPermission();
    });

    function setupEventListeners() {
      startBtn.addEventListener('click', startTimer);
      pauseBtn.addEventListener('click', pauseTimer);
      resetBtn.addEventListener('click', resetTimer);
      modeBtns.forEach(btn => btn.addEventListener('click', () => {
        if (!isRunning) switchMode(btn.dataset.mode);
      }));
      document.addEventListener('keydown', handleKeyPress);
      musicBtns.forEach(btn => btn.addEventListener('click', () => {
        musicBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSound = btn.dataset.sound;
        if (isMusicPlaying) playMusic(currentSound);
        else musicStatus.textContent = currentSound === 'none' ? '已关闭' : `已选择 ${getSoundName(currentSound)}，点击播放开始`;
      }));
      musicToggle.addEventListener('click', toggleMusic);
      volumeSlider.addEventListener('input', (e) => {
        const vol = parseFloat(e.target.value);
        if (musicGain) musicGain.gain.value = vol;
      });
    }

    // ===== 计时核心 =====
    function startTimer() {
      if (isRunning) return;
      // 首次交互：初始化音频上下文（解决自动播放限制）
      initAudioContext();
      
      isRunning = true;
      startBtn.disabled = true; startBtn.textContent = '⏳ 进行中';
      pauseBtn.disabled = false;
      statusText.textContent = currentMode === 'work' ? '🍅 专注工作中...' : '☕ 放松休息中～';
      timerLabel.textContent = currentMode === 'work' ? '专注中' : '休息中';
      
      timerId = setInterval(() => {
        timeLeft--;
        updateDisplay();
        if (timeLeft <= 0) {
          clearInterval(timerId); timerId = null;
          handleTimerComplete();
        }
      }, 1000);
    }

    function pauseTimer() {
      if (!isRunning) return;
      clearInterval(timerId); timerId = null;
      isRunning = false;
      startBtn.disabled = false; startBtn.textContent = '▶ 继续';
      pauseBtn.disabled = true;
      statusText.textContent = '已暂停';
    }

    function resetTimer() {
      clearInterval(timerId); timerId = null;
      isRunning = false;
      timeLeft = totalTime = currentMode === 'work' ? settings.work : settings.break;
      updateDisplay();
      startBtn.disabled = false; startBtn.textContent = '▶ 开始';
      pauseBtn.disabled = true;
      statusText.textContent = '准备开始专注～';
      timerLabel.textContent = '准备中';
      document.body.classList.remove('timer-complete');
    }

    function handleTimerComplete() {
      isRunning = false;
      startBtn.disabled = false; startBtn.textContent = '▶ 开始';
      pauseBtn.disabled = true;
      document.body.classList.add('timer-complete');
      
      if (settings.sound) {
        playAlertSound();
        sendNotification(
          currentMode === 'work' ? '🍅 专注完成！' : '☕ 休息结束',
          currentMode === 'work' ? '该休息一下啦～' : '准备开始下一轮专注吧！'
        );
        if ('vibrate' in navigator) navigator.vibrate([100, 50, 100]);
      }
      
      if (settings.auto) {
        setTimeout(() => {
          const next = currentMode === 'work' ? 'break' : 'work';
          switchMode(next);
          setTimeout(() => { if (!isRunning) startTimer(); }, 3000);
        }, 2000);
      } else {
        statusText.textContent = currentMode === 'work'
          ? '🎉 专注完成！点击重置开始休息'
          : '✨ 休息结束！点击重置继续专注';
      }
    }

    function updateDisplay() {
      const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
      const display = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
      timerText.textContent = display;
      document.title = `${display} · 🍅 番茄时钟`;
      
      // 更新环形进度
      const progress = (totalTime - timeLeft) / totalTime;
      const circumference = 2 * Math.PI * 90;
      ringProgress.style.strokeDashoffset = circumference * (1 - progress);
    }

    function switchMode(mode) {
      currentMode = mode;
      document.body.dataset.mode = mode;
      modeBtns.forEach(btn => {
        const active = btn.dataset.mode === mode;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-selected', active);
      });
      const duration = mode === 'work' ? settings.work : settings.break;
      timeLeft = totalTime = duration;
      timerLabel.textContent = mode === 'work' ? '准备专注' : '准备休息';
      statusText.textContent = mode === 'work' ? '🍅 准备开始专注' : '☕ 准备放松休息';
      updateDisplay();
      ringProgress.style.strokeDashoffset = 0;
    }

    // ===== 设置管理 =====
    function loadSettings() {
      try {
        const saved = localStorage.getItem('tomato-settings');
        if (saved) {
          const parsed = JSON.parse(saved);
          settings = { ...settings, ...parsed };
          $('workDuration').value = settings.work / 60;
          $('breakDuration').value = settings.break / 60;
          $('autoStart').checked = settings.auto;
          $('soundEnabled').checked = settings.sound;
        }
      } catch (e) { console.warn('加载设置失败:', e); }
      if (currentMode === 'work') {
        totalTime = timeLeft = settings.work;
      } else {
        totalTime = timeLeft = settings.break;
      }
    }

    function saveSettings() {
      settings.work = Math.min(Math.max(parseInt($('workDuration').value) || 25, 1), 120) * 60;
      settings.break = Math.min(Math.max(parseInt($('breakDuration').value) || 5, 1), 60) * 60;
      settings.auto = $('autoStart').checked;
      settings.sound = $('soundEnabled').checked;
      localStorage.setItem('tomato-settings', JSON.stringify(settings));
      
      if (!isRunning) {
        timeLeft = totalTime = currentMode === 'work' ? settings.work : settings.break;
        updateDisplay();
      }
      const btn = event.target;
      const orig = btn.textContent;
      btn.textContent = '✅ 已保存';
      setTimeout(() => btn.textContent = orig, 1500);
    }

    // ===== 键盘快捷键 =====
    function handleKeyPress(e) {
      if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;
      switch (e.key.toLowerCase()) {
        case ' ': e.preventDefault(); isRunning ? pauseTimer() : startTimer(); break;
        case 'r': resetTimer(); break;
        case 'w': if (!isRunning) switchMode('work'); break;
        case 'b': if (!isRunning) switchMode('break'); break;
        case 'm': toggleMusic(); break;
      }
    }

    // ===== 通知系统 =====
    function checkNotificationPermission() {
      if ('Notification' in window && Notification.permission === 'default') {
        notificationBanner.classList.add('show');
      }
    }
    function requestNotificationPermission() {
      if ('Notification' in window) {
        Notification.requestPermission().then(p => {
          if (p === 'granted') notificationBanner.classList.remove('show');
        });
      }
    }
    function sendNotification(title, body) {
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification(title, { body, tag: 'tomato-timer', icon: '🍅' });
      }
    }

    // ===== 触感反馈 =====
    function hapticFeedback(pattern = [50]) {
      if ('vibrate' in navigator) { try { navigator.vibrate(pattern); } catch(e) {} }
    }

    // ===== 提示音（计时结束） =====
    function playAlertSound() {
      if (!settings.sound) return;
      try {
        initAudioContext();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 880; osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
      } catch(e) { console.log('提示音播放失败:', e); }
    }

    // ===== 音频上下文初始化（关键：解决自动播放限制） =====
    function initAudioContext() {
      if (audioCtx) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return true;
      }
      try {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return false;
        audioCtx = new AC();
        return true;
      } catch(e) {
        console.warn('Web Audio API 不支持');
        return false;
      }
    }

    // ===== 白噪音生成器（纯前端，无需外部文件） =====
    function generateNoiseBuffer(type, duration = 2) {
      if (!audioCtx) return null;
      const sampleRate = audioCtx.sampleRate;
      const length = sampleRate * duration;
      const buffer = audioCtx.createBuffer(1, length, sampleRate);
      const data = buffer.getChannelData(0);
      
      // 不同类型的噪声算法（安全振幅 0.05~0.3）
      const t = Date.now() * 0.001;
      for (let i = 0; i < length; i++) {
        const time = i / sampleRate;
        let val = 0;
        switch(type) {
          case 'rain':
            val = (Math.random() - 0.5) * 0.2 + Math.sin(time * 800 + t * 2) * 0.05;
            break;
          case 'forest':
            val = (Math.random() - 0.5) * 0.15 + Math.sin(time * 300 + t) * 0.08;
            break;
          case 'cafe':
            val = (Math.random() - 0.5) * 0.25 + Math.sin(time * 1200 + t * 3) * 0.03;
            break;
          case 'waves':
            val = Math.sin(time * 200 + t * 0.5) * 0.3 + (Math.random() - 0.5) * 0.05;
            break;
          default:
            val = (Math.random() - 0.5) * 0.2;
        }
        // 限制振幅防止爆音
        data[i] = Math.max(-0.3, Math.min(0.3, val));
      }
      return buffer;
    }

    // ===== 音乐播放控制 =====
    function getSoundName(k) {
      return { rain:'🌧️ 雨声', forest:'🌲 森林', cafe:'☕ 咖啡馆', waves:'🌊 海浪', none:'🔇 关闭' }[k] || k;
    }

    function toggleMusic() {
      // 首次点击：确保音频上下文已初始化（用户交互）
      const initialized = initAudioContext();
      if (!initialized) {
        musicStatus.textContent = '⚠️ 浏览器不支持音频';
        return;
      }
      
      if (currentSound === 'none') currentSound = 'rain';
      
      if (isMusicPlaying) {
        stopMusic();
      } else {
        playMusic(currentSound);
      }
    }

    function playMusic(type) {
      stopMusic(); // 先清理旧资源
      if (type === 'none') {
        updateMusicUI('none', '已关闭');
        return;
      }
      
      try {
        // 生成 2 秒噪声缓冲（循环播放，内存占用极小）
        noiseBuffer = generateNoiseBuffer(type, 2);
        if (!noiseBuffer) throw new Error('生成失败');
        
        // 创建音频源
        musicSource = audioCtx.createBufferSource();
        musicSource.buffer = noiseBuffer;
        musicSource.loop = true;
        
        // 音量控制
        musicGain = audioCtx.createGain();
        musicGain.gain.value = parseFloat(volumeSlider.value) || 0.3;
        
        // 连接：源 → 增益 → 输出
        musicSource.connect(musicGain);
        musicGain.connect(audioCtx.destination);
        
        // 播放（必须在用户交互事件内）
        musicSource.start(0);
        isMusicPlaying = true;
        updateMusicUI('playing', `🎵 播放中: ${getSoundName(type)}`);
        
      } catch(err) {
        console.error('音乐播放错误:', err);
        updateMusicUI('error', '⚠️ 播放失败，请刷新重试');
      }
    }

    function stopMusic() {
      if (musicSource) {
        try { musicSource.stop(0); } catch(e) {}
        try { musicSource.disconnect(); } catch(e) {}
        musicSource = null;
      }
      if (musicGain) {
        try { musicGain.disconnect(); } catch(e) {}
        musicGain = null;
      }
      isMusicPlaying = false;
    }

    function updateMusicUI(status, message) {
      const btn = musicToggle;
      switch(status) {
        case 'none':
        case 'paused':
          btn.textContent = '▶ 播放'; btn.disabled = false; break;
        case 'playing':
          btn.textContent = '⏸ 暂停'; btn.disabled = false; break;
        case 'error':
          btn.textContent = '🔄 重试'; btn.disabled = false; break;
      }
      if (message) musicStatus.textContent = message;
    }

    // ===== 页面卸载时清理音频资源 =====
    window.addEventListener('beforeunload', () => {
      stopMusic();
      if (audioCtx && audioCtx.state !== 'closed') {
        try { audioCtx.close(); } catch(e) {}
      }
    });
  </script>
</body>
</html>
