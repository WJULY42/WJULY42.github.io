<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #f0f6fc; font-family: 'JetBrains Mono', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .timer-ring { transform: rotate(-90deg); transform-origin: 50% 50%; }
    </style>
</head>
<body>
    <div class="relative w-64 h-64 flex items-center justify-center">
        <!-- 进度环 SVG -->
        <svg class="absolute inset-0 w-full h-full timer-ring" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="45" fill="none" stroke="#30363d" stroke-width="4" />
            <circle id="progress" cx="50" cy="50" r="45" fill="none" stroke="#58a6ff" stroke-width="4" stroke-dasharray="283" stroke-dashoffset="0" stroke-linecap="round" class="transition-all duration-1000" />
        </svg>
        <div class="text-6xl font-bold z-10" id="time-display">25:00</div>
    </div>

    <div class="mt-10 flex gap-4">
        <button onclick="startTimer()" class="px-6 py-2 bg-[#238636] text-white rounded-md font-bold hover:bg-[#2ea043] transition">Start</button>
        <button onclick="resetTimer()" class="px-6 py-2 bg-[#21262d] border border-[#30363d] rounded-md font-bold hover:bg-[#30363d] transition">Reset</button>
    </div>

    <script>
        let timeLeft = 25 * 60;
        let totalTime = 25 * 60;
        let timerId = null;
        const display = document.getElementById('time-display');
        const progress = document.getElementById('progress');
        const circumference = 2 * Math.PI * 45;

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            display.textContent = `${m}:${s}`;
            
            const offset = circumference - (timeLeft / totalTime) * circumference;
            progress.style.strokeDashoffset = offset;
        }

        function startTimer() {
            if(timerId) return;
            timerId = setInterval(() => {
                if(timeLeft > 0) {
                    timeLeft--;
                    updateDisplay();
                } else {
                    clearInterval(timerId);
                    timerId = null;
                    alert("Focus session complete!");
                }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(timerId);
            timerId = null;
            timeLeft = 25 * 60;
            updateDisplay();
        }
        
        updateDisplay();
    </script>
</body>
</html>
