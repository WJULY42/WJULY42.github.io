<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="🍅 番茄时钟 · 专注工作法">
  <title>🍅 番茄时钟 | WJULY42</title>
  
  <!-- ✅ 统一引入项目全局样式 -->
  <link rel="stylesheet" href="../style.css">
  
  <!-- 工具专属微调样式（仅保留必要的特殊样式，其余继承全局） -->
  <style>
    /* 进度环和卡片微调 —— 使用全局变量，暗色模式自动适配 */
    .tomato-container {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 2.5rem;
      align-items: start;
      max-width: 960px;
      margin: 0 auto;
    }
    
    /* 全局卡片已有样式，这里微调内部间距 */
    .timer-card {
      padding: 2rem 1.8rem;
      text-align: center;
    }
    
    .mode-toggle {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin: 1.5rem 0;
      background: var(--border);
      padding: 0.35rem;
      border-radius: 14px;
      inline-size: fit-content;
      margin-inline: auto;
    }
    
    .mode-btn {
      padding: 0.6rem 1.4rem;
      border: none;
      background: transparent;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      color: var(--text-light);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    
    .mode-btn:hover {
      color: var(--text);
      background: var(--card);
    }
    
    .mode-btn.active {
      background: var(--card);
      color: var(--primary);
      box-shadow: var(--shadow);
    }
    
    /* SVG 进度环 */
    .timer-ring {
      width: 260px;
      height: 260px;
      margin: 0 auto;
      display: block;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1));
    }
    
    .ring-bg {
      stroke: var(--border);
    }
    
    .ring-progress {
      stroke: var(--primary);
      stroke-dasharray: 565.48;
      stroke-dashoffset: 0;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: 100px 100px;
      transition: stroke-dashoffset 0.3s linear;
    }
    
    /* 不同模式下的进度环颜色 */
    body[data-mode="work"] .ring-progress { stroke: #ef4444; }
    body[data-mode="break"] .ring-progress { stroke: #22c55e; }
    
    .timer-text {
      dominant-baseline: middle;
      font-size: 2.8rem;
      font-weight: 700;
      font-family: 'SF Mono', 'Fira Code', monospace;
      fill: var(--text);
    }
    
    .timer-label {
      font-size: 1rem;
      fill: var(--text-light);
    }
    
    /* 控制按钮组：继承全局 .btn，这里只调整间距 */
    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin: 2rem 0 1.5rem;
      flex-wrap: wrap;
    }
    
    .btn-secondary {
      background: var(--text-light);
      box-shadow: none;
    }
    
    .btn-secondary:hover {
      background: #475569;
    }
    
    /* 右侧面板卡片微调 */
    .panel-card {
      padding: 1.2rem;
    }
    
    .shortcut-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem 1rem;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
    
    .shortcut-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-light);
    }
    
    .key {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.2rem 0.5rem;
      font-family: monospace;
      font-weight: 600;
      font-size: 0.85rem;
      min-width: 28px;
      text-align: center;
    }
    
    /* 音乐选项网格 */
    .music-options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.6rem;
      margin: 1rem 0;
    }
    
    .music-btn {
      padding: 0.6rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      color: var(--text);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      font-weight: 500;
    }
    
    .music-btn:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
    }
    
    .music-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    
    .music-controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    
    .volume-control {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex: 1;
    }
    
    .volume-control input {
      flex: 1;
      height: 6px;
      accent-color: var(--primary);
    }
    
    .music-status {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-top: 0.5rem;
    }
    
    /* 通知横幅 */
    .notification-banner {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--primary);
      color: white;
      padding: 0.9rem 1.8rem;
      border-radius: 12px;
      box-shadow: var(--shadow);
      display: none;
      z-index: 100;
      align-items: center;
      gap: 1rem;
    }
    
    .notification-banner.show {
      display: flex;
    }
    
    /* 响应式 */
    @media (max-width: 800px) {
      .tomato-container {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
      .timer-ring {
        width: 220px;
        height: 220px;
      }
      .timer-text {
        font-size: 2.4rem;
      }
    }
    
    @media (max-width: 480px) {
      .timer-ring {
        width: 190px;
        height: 190px;
      }
      .timer-text {
        font-size: 2rem;
      }
      .shortcut-grid {
        grid-template-columns: 1fr;
      }
      .music-options {
        grid-template-columns: 1fr;
      }
    }
    
    /* 保留原有关键动画 */
    @keyframes pulse {
      0%,100% { transform: rotate(-90deg) scale(1); }
      50% { transform: rotate(-90deg) scale(1.05); }
    }
    body.timer-complete .ring-progress {
      animation: pulse 0.5s ease-in-out 3;
    }
  </style>
</head>
<body data-mode="work">

  <!-- 桌面通知横幅 -->
  <div class="notification-banner" id="notificationBanner">
    🔔 开启桌面通知，不错过每个专注时刻
    <button class="btn" onclick="requestNotificationPermission()" style="padding:0.3rem 1rem;">允许</button>
    <button class="btn btn-secondary" onclick="this.parentElement.classList.remove('show')" style="padding:0.3rem 0.8rem;">✕</button>
  </div>

  <main class="tomato-container">
    <!-- 左侧计时核心区 -->
    <section class="card timer-card">
      <header style="margin-bottom: 1rem;">
        <h1 style="font-size: 1.8rem;">🍅 番茄时钟</h1>
        <p style="color: var(--text-light);">25 分钟深度专注 · 5 分钟高效休息</p>
      </header>
      
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="work">🍅 工作</button>
        <button class="mode-btn" data-mode="break">☕ 休息</button>
      </div>
      
      <svg class="timer-ring" viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="90" fill="none" stroke-width="10"/>
        <circle class="ring-progress" cx="100" cy="100" r="90" fill="none" stroke-width="10" stroke-dasharray="565.48"/>
        <text class="timer-text" x="100" y="95" text-anchor="middle">25:00</text>
        <text class="timer-label" x="100" y="125" text-anchor="middle">准备专注</text>
      </svg>
      
      <div class="controls">
        <button class="btn" id="startBtn">▶ 开始</button>
        <button class="btn btn-secondary" id="pauseBtn" disabled>⏸ 暂停</button>
        <button class="btn btn-secondary" id="resetBtn">🔄 重置</button>
      </div>
      
      <div class="status" id="statusText" style="min-height:1.8rem; color: var(--text-light);">准备开始专注～</div>
    </section>

    <!-- 右侧辅助面板 -->
    <aside style="display: flex; flex-direction: column; gap: 1.5rem;">
      <!-- 快捷键卡片 -->
      <div class="card panel-card">
        <h4 style="margin-bottom: 0.8rem;">⌨️ 键盘快捷键</h4>
        <div class="shortcut-grid">
          <div class="shortcut-item"><span class="key">Space</span> 开始/暂停</div>
          <div class="shortcut-item"><span class="key">R</span> 重置</div>
          <div class="shortcut-item"><span class="key">W</span> 工作模式</div>
          <div class="shortcut-item"><span class="key">B</span> 休息模式</div>
          <div class="shortcut-item"><span class="key">M</span> 播放/暂停音乐</div>
          <div class="shortcut-item"><span class="key">↑↓</span> 调节音量</div>
        </div>
      </div>
      
      <!-- 设置卡片 -->
      <details class="card panel-card">
        <summary style="cursor:pointer; font-weight:600; list-style:none;">⚙️ 个性化设置</summary>
        <div style="padding-top:1rem; display:grid; gap:0.9rem;">
          <label style="display:flex; justify-content:space-between;">
            🍅 工作时长 <input type="number" id="workDuration" min="1" max="120" value="25" style="width:70px; padding:0.3rem; border:1px solid var(--border); border-radius:6px; background:var(--card); color:var(--text);"> 分钟
          </label>
          <label style="display:flex; justify-content:space-between;">
            ☕ 休息时长 <input type="number" id="breakDuration" min="1" max="60" value="5" style="width:70px; padding:0.3rem; border:1px solid var(--border); border-radius:6px; background:var(--card); color:var(--text);"> 分钟
          </label>
          <label style="display:flex; align-items:center; gap:0.5rem;">
            <input type="checkbox" id="autoStart" checked> 自动开始下一轮
          </label>
          <label style="display:flex; align-items:center; gap:0.5rem;">
            <input type="checkbox" id="soundEnabled" checked> 启用完成提示音
          </label>
          <button class="btn" onclick="saveSettings()" style="padding:0.5rem 1rem;">💾 保存设置</button>
        </div>
      </details>
      
      <!-- 音乐卡片 -->
      <div class="card panel-card">
        <div style="font-weight:600; margin-bottom:1rem;">🎵 专注钢琴曲</div>
        <div class="music-options">
          <button class="music-btn active" data-sound="none">🔇 关闭</button>
          <button class="music-btn" data-sound="piano1">🎹 经典</button>
          <button class="music-btn" data-sound="piano2">🌙 舒缓</button>
          <button class="music-btn" data-sound="piano3">☕ 爵士</button>
          <button class="music-btn" data-sound="piano4">🌌 氛围</button>
        </div>
        <div class="music-controls">
          <button class="btn btn-secondary" id="musicToggle" style="padding:0.5rem 1.2rem;">▶ 播放</button>
          <div class="volume-control">
            <span>🔈</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.4">
            <span id="volumeValue">40%</span>
          </div>
        </div>
        <div class="music-status" id="musicStatus">点击播放开始聆听</div>
      </div>
    </aside>
  </main>
  
  <footer style="text-align:center; margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--border); color:var(--text-light);">
    <p>💡 技巧：每完成 4 个番茄钟，建议长休息 15-30 分钟</p>
    <p style="margin-top:0.5rem;">
      <a href="https://wjuly42.github.io/tools/" style="color:var(--primary);">← 返回工具集</a> · 
      <a href="https://github.com/WJULY42" target="_blank" style="color:var(--primary);">GitHub</a>
    </p>
  </footer>

  <script>
    (function(){
      "use strict";
      
      // ---------- DOM 元素 ----------
      const $ = id => document.getElementById(id);
      const timerText = document.querySelector('.timer-text');
      const timerLabel = document.querySelector('.timer-label');
      const ringProgress = document.querySelector('.ring-progress');
      const startBtn = $('startBtn'), pauseBtn = $('pauseBtn'), resetBtn = $('resetBtn');
      const statusText = $('statusText');
      const modeBtns = document.querySelectorAll('.mode-btn');
      const musicBtns = document.querySelectorAll('.music-btn');
      const musicToggle = $('musicToggle');
      const volumeSlider = $('volumeSlider');
      const volumeValue = $('volumeValue');
      const musicStatus = $('musicStatus');
      const notificationBanner = $('notificationBanner');
      
      // ---------- 状态变量 ----------
      let timeLeft = 25 * 60, totalTime = 25 * 60;
      let isRunning = false;
      let currentMode = 'work';
      let settings = { work: 1500, break: 300, auto: true, sound: true };
      
      // 🚀 rAF 计时相关
      let animFrame = null;
      let startTimestamp = 0;
      let initialRemaining = 0;
      
      // 音乐相关
      let currentSound = 'none';
      let isMusicPlaying = false;
      let activeAudio = null;
      let audioCtx = null, musicSource = null, musicGain = null;
      
      const soundPaths = {
        piano1: './sounds/piano1.mp3',
        piano2: './sounds/piano2.mp3',
        piano3: './sounds/piano3.mp3',
        piano4: './sounds/piano4.mp3'
      };
      
      // ---------- 辅助函数 ----------
      function formatTime(sec) {
        const m = Math.floor(sec / 60), s = sec % 60;
        return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
      }
      
      function updateDisplay() {
        timerText.textContent = formatTime(timeLeft);
        document.title = `${formatTime(timeLeft)} · 🍅 番茄时钟`;
        const progress = (totalTime - timeLeft) / totalTime;
        ringProgress.style.strokeDashoffset = 565.48 * (1 - progress);
      }
      
      // ---------- 基于 rAF 的计时器 ----------
      function stopTimer() {
        if (animFrame) {
          cancelAnimationFrame(animFrame);
          animFrame = null;
        }
        isRunning = false;
        startBtn.disabled = false;
        startBtn.textContent = '▶ 开始';
        pauseBtn.disabled = true;
      }
      
      function startTimer() {
        if (isRunning || timeLeft <= 0) return;
        initAudioContext(); // 预初始化音频上下文
        
        isRunning = true;
        startBtn.disabled = true;
        startBtn.textContent = '⏳ 专注中';
        pauseBtn.disabled = false;
        statusText.textContent = currentMode === 'work' ? '🍅 深度工作中，请勿打扰' : '☕ 放松休息，恢复精力';
        timerLabel.textContent = currentMode === 'work' ? '专注中' : '休息中';
        
        startTimestamp = performance.now();
        initialRemaining = timeLeft;
        
        function tick(now) {
          const elapsedSeconds = Math.floor((now - startTimestamp) / 1000);
          const newRemaining = Math.max(0, initialRemaining - elapsedSeconds);
          
          if (newRemaining !== timeLeft) {
            timeLeft = newRemaining;
            updateDisplay();
            
            if (timeLeft <= 0) {
              stopTimer();
              handleTimerComplete();
              return;
            }
          }
          animFrame = requestAnimationFrame(tick);
        }
        
        animFrame = requestAnimationFrame(tick);
      }
      
      function pauseTimer() {
        if (!isRunning) return;
        stopTimer();
        statusText.textContent = '已暂停 · 随时继续';
        startBtn.textContent = '▶ 继续';
      }
      
      function resetTimer() {
        stopTimer();
        timeLeft = totalTime = currentMode === 'work' ? settings.work : settings.break;
        updateDisplay();
        statusText.textContent = '准备开始专注～';
        timerLabel.textContent = currentMode === 'work' ? '准备专注' : '准备休息';
        document.body.classList.remove('timer-complete');
        startBtn.textContent = '▶ 开始';
      }
      
      // ---------- 计时完成 ----------
      function handleTimerComplete() {
        document.body.classList.add('timer-complete');
        if (settings.sound) {
          playAlertSound();
          sendNotification(currentMode === 'work' ? '🍅 专注完成！' : '☕ 休息结束',
                           currentMode === 'work' ? '该休息一下啦～' : '准备开始下一轮专注吧！');
          if ('vibrate' in navigator) navigator.vibrate([100, 50, 100]);
        }
        
        if (settings.auto) {
          setTimeout(() => {
            const nextMode = currentMode === 'work' ? 'break' : 'work';
            switchMode(nextMode);
            setTimeout(() => { if (!isRunning) startTimer(); }, 500);
          }, 2000);
        } else {
          statusText.textContent = currentMode === 'work' ? '🎉 专注完成！点击重置开始休息' : '✨ 休息结束！点击重置继续专注';
        }
      }
      
      // ---------- 模式切换 ----------
      function switchMode(mode) {
        if (isRunning) return;
        currentMode = mode;
        document.body.dataset.mode = mode;
        modeBtns.forEach(btn => {
          const active = btn.dataset.mode === mode;
          btn.classList.toggle('active', active);
          btn.setAttribute('aria-selected', active);
        });
        totalTime = timeLeft = mode === 'work' ? settings.work : settings.break;
        timerLabel.textContent = mode === 'work' ? '准备专注' : '准备休息';
        statusText.textContent = mode === 'work' ? '🍅 准备开始深度专注' : '☕ 准备放松休息';
        updateDisplay();
        ringProgress.style.strokeDashoffset = 0;
        document.body.classList.remove('timer-complete');
      }
      
      // ---------- 设置 ----------
      function loadSettings() {
        try {
          const saved = localStorage.getItem('tomato-settings');
          if (saved) {
            const p = JSON.parse(saved);
            settings = { ...settings, ...p };
            $('workDuration').value = settings.work / 60;
            $('breakDuration').value = settings.break / 60;
            $('autoStart').checked = settings.auto;
            $('soundEnabled').checked = settings.sound;
          }
        } catch(e) {}
        totalTime = timeLeft = currentMode === 'work' ? settings.work : settings.break;
        updateDisplay();
      }
      
      window.saveSettings = function() {
        settings.work = Math.min(Math.max(parseInt($('workDuration').value) || 25, 1), 120) * 60;
        settings.break = Math.min(Math.max(parseInt($('breakDuration').value) || 5, 1), 60) * 60;
        settings.auto = $('autoStart').checked;
        settings.sound = $('soundEnabled').checked;
        localStorage.setItem('tomato-settings', JSON.stringify(settings));
        if (!isRunning) {
          totalTime = timeLeft = currentMode === 'work' ? settings.work : settings.break;
          updateDisplay();
        }
        const btn = event.target;
        const orig = btn.textContent;
        btn.textContent = '✅ 已保存';
        setTimeout(() => btn.textContent = orig, 1500);
      };
      
      // ---------- 通知 ----------
      function checkNotificationPermission() {
        if ('Notification' in window && Notification.permission === 'default') {
          notificationBanner.classList.add('show');
        }
      }
      window.requestNotificationPermission = function() {
        if ('Notification' in window) {
          Notification.requestPermission().then(p => {
            if (p === 'granted') notificationBanner.classList.remove('show');
          });
        }
      };
      function sendNotification(title, body) {
        if ('Notification' in window && Notification.permission === 'granted') {
          new Notification(title, { body, tag: 'tomato-timer', icon: '🍅' });
        }
      }
      
      // ---------- 键盘快捷键 ----------
      function handleKeyPress(e) {
        if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
        switch(e.key.toLowerCase()) {
          case ' ': e.preventDefault(); isRunning ? pauseTimer() : startTimer(); break;
          case 'r': resetTimer(); break;
          case 'w': if (!isRunning) switchMode('work'); break;
          case 'b': if (!isRunning) switchMode('break'); break;
          case 'm': toggleMusic(); break;
          case 'arrowup': e.preventDefault(); volumeSlider.value = Math.min(1, +volumeSlider.value + 0.1); volumeSlider.dispatchEvent(new Event('input')); break;
          case 'arrowdown': e.preventDefault(); volumeSlider.value = Math.max(0, +volumeSlider.value - 0.1); volumeSlider.dispatchEvent(new Event('input')); break;
        }
      }
      
      // ---------- 音频初始化 ----------
      function initAudioContext() {
        if (audioCtx) return true;
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          return true;
        } catch(e) { return false; }
      }
      
      function playAlertSound() {
        if (!settings.sound) return;
        initAudioContext();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
      }
      
      // ---------- 音乐控制 ----------
      function updateVolumeDisplay() {
        const vol = parseFloat(volumeSlider.value);
        volumeValue.textContent = Math.round(vol * 100) + '%';
        if (activeAudio) activeAudio.volume = vol;
        if (musicGain) musicGain.gain.value = vol;
      }
      
      function stopMusic() {
        if (activeAudio) { activeAudio.pause(); activeAudio.src = ''; activeAudio = null; }
        if (musicSource) { try { musicSource.stop(); } catch(e) {} musicSource = null; }
        isMusicPlaying = false;
        musicToggle.textContent = '▶ 播放';
        musicStatus.textContent = currentSound === 'none' ? '已关闭' : '已暂停';
      }
      
      function playMusic(type) {
        stopMusic();
        if (type === 'none') {
          musicStatus.textContent = '已关闭';
          return;
        }
        musicStatus.textContent = '🔄 加载音乐...';
        try {
          activeAudio = new Audio(soundPaths[type]);
          activeAudio.loop = true;
          activeAudio.volume = parseFloat(volumeSlider.value);
          activeAudio.oncanplay = () => {
            activeAudio.play().then(() => {
              isMusicPlaying = true;
              musicToggle.textContent = '⏸ 暂停';
              musicStatus.textContent = `🎵 播放中: ${getSoundName(type)}`;
            }).catch(() => {
              musicStatus.textContent = '👆 请点击页面任意位置后重试';
            });
          };
          activeAudio.onerror = () => {
            musicStatus.textContent = '⚠️ 加载失败，尝试备用方案';
            playMusicWebAudio(type);
          };
          activeAudio.load();
        } catch(e) {
          playMusicWebAudio(type);
        }
      }
      
      function playMusicWebAudio(type) {
        initAudioContext();
        if (!audioCtx) { musicStatus.textContent = '❌ 浏览器不支持音频'; return; }
        fetch(soundPaths[type])
          .then(res => res.arrayBuffer())
          .then(buf => audioCtx.decodeAudioData(buf))
          .then(buffer => {
            musicSource = audioCtx.createBufferSource();
            musicSource.buffer = buffer;
            musicSource.loop = true;
            musicGain = audioCtx.createGain();
            musicGain.gain.value = parseFloat(volumeSlider.value);
            musicSource.connect(musicGain);
            musicGain.connect(audioCtx.destination);
            musicSource.start(0);
            isMusicPlaying = true;
            musicToggle.textContent = '⏸ 暂停';
            musicStatus.textContent = `🎵 播放中: ${getSoundName(type)}`;
          })
          .catch(() => { musicStatus.textContent = '❌ 无法加载音频文件'; });
      }
      
      function toggleMusic() {
        initAudioContext();
        if (currentSound === 'none') currentSound = 'piano1';
        isMusicPlaying ? stopMusic() : playMusic(currentSound);
      }
      
      function getSoundName(k) {
        const map = { piano1:'经典钢琴', piano2:'舒缓钢琴', piano3:'爵士钢琴', piano4:'氛围钢琴', none:'关闭' };
        return map[k] || k;
      }
      
      // ---------- 事件绑定 ----------
      function bindEvents() {
        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);
        
        modeBtns.forEach(btn => btn.addEventListener('click', () => {
          if (!isRunning) switchMode(btn.dataset.mode);
        }));
        
        musicBtns.forEach(btn => btn.addEventListener('click', () => {
          musicBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentSound = btn.dataset.sound;
          if (isMusicPlaying) playMusic(currentSound);
          else musicStatus.textContent = currentSound === 'none' ? '已关闭' : `已选择 ${getSoundName(currentSound)}`;
        }));
        
        musicToggle.addEventListener('click', toggleMusic);
        volumeSlider.addEventListener('input', updateVolumeDisplay);
        document.addEventListener('keydown', handleKeyPress);
        document.querySelector('.settings-panel .btn').addEventListener('click', saveSettings);
        
        window.addEventListener('beforeunload', () => {
          stopMusic();
          if (audioCtx) audioCtx.close();
        });
      }
      
      // ---------- 初始化 ----------
      function init() {
        loadSettings();
        updateDisplay();
        bindEvents();
        checkNotificationPermission();
        updateVolumeDisplay();
      }
      
      init();
    })();
  </script>
</body>
</html>
