<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #f0f6fc; font-family: 'Inter', sans-serif; padding: 2rem; }
        .task-item { transition: all 0.2s; }
        .task-item:hover { background-color: #161b22; }
        .completed span { text-decoration: line-through; color: #8b949e; }
        .completed .check-icon { color: #3fb950; }
    </style>
</head>
<body class="max-w-md mx-auto">
    <div class="flex gap-2 mb-6">
        <input type="text" id="input" placeholder="Add a new task..." class="flex-grow bg-[#010409] border border-[#30363d] rounded-md px-3 py-2 outline-none focus:border-[#58a6ff] text-sm">
        <button onclick="addTask()" class="bg-[#238636] text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-[#2ea043]">Add</button>
    </div>
    <ul id="list" class="space-y-2">
        <!-- Tasks will appear here -->
    </ul>

    <script>
        const input = document.getElementById('input');
        const list = document.getElementById('list');
        
        // Load from local storage
        let tasks = JSON.parse(localStorage.getItem('lunar_tasks')) || [];
        render();

        function addTask() {
            if(!input.value.trim()) return;
            tasks.unshift({ text: input.value, done: false });
            save();
            input.value = '';
        }

        function toggle(index) {
            tasks[index].done = !tasks[index].done;
            save();
        }

        function remove(index) {
            tasks.splice(index, 1);
            save();
        }

        function save() {
            localStorage.setItem('lunar_tasks', JSON.stringify(tasks));
            render();
        }

        function render() {
            list.innerHTML = tasks.map((t, i) => `
                <li class="task-item flex items-center justify-between p-3 border border-[#30363d] rounded-md ${t.done ? 'completed' : ''}">
                    <div class="flex items-center gap-3 cursor-pointer" onclick="toggle(${i})">
                        <svg class="check-icon w-5 h-5 ${t.done ? 'text-[#3fb950]' : 'text-[#8b949e]'}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${t.done ? 'M5 13l4 4L19 7' : 'M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z'}"></path></svg>
                        <span class="text-sm">${t.text}</span>
                    </div>
                    <button onclick="remove(${i})" class="text-[#8b949e] hover:text-[#da3633] transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </li>
            `).join('');
        }
        
        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') addTask(); });
    </script>
</body>
</html>
