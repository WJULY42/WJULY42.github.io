<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>待办清单 - 在线工具</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 2rem auto; }
        ul { list-style: none; padding: 0; }
        li { margin: 0.5rem 0; }
        .done { text-decoration: line-through; color: gray; }
    </style>
</head>
<body>
    <h2>✅ 待办清单</h2>
    <input type="text" id="taskInput" placeholder="写一个新任务">
    <button onclick="addTask()">添加</button>
    <ul id="taskList"></ul>
    <p><a href="index.html">← 返回工具集</a></p>

    <script>
        function addTask() {
            let input = document.getElementById('taskInput');
            let text = input.value.trim();
            if (text === "") return;
            let li = document.createElement('li');
            li.innerHTML = `<span>${text}</span> <button onclick="toggleDone(this)">✓</button> <button onclick="deleteTask(this)">✗</button>`;
            document.getElementById('taskList').appendChild(li);
            input.value = "";
        }
        function toggleDone(btn) {
            let span = btn.parentElement.querySelector('span');
            span.classList.toggle('done');
        }
        function deleteTask(btn) {
            btn.parentElement.remove();
        }
    </script>
</body>
</html>
