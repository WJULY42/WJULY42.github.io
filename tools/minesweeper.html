<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Minesweeper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .cell { width: 30px; height: 30px; border: 1px solid #30363d; display: flex; justify-content: center; align-items: center; cursor: pointer; user-select: none; }
        .cell:hover { background-color: #21262d; }
        .revealed { background-color: #161b22; color: #58a6ff; font-weight: bold; }
        .mine { background-color: #da3633; color: white; }
    </style>
</head>
<body>
    <div id="grid" class="grid grid-cols-10 gap-1 border border-[#30363d] p-2 rounded bg-[#010409]"></div>
    <script>
        const grid = document.getElementById('grid');
        const size = 10, mines = 10;
        let board = [];
        
        function init() {
            board = Array(size).fill().map(() => Array(size).fill(0));
            for(let i=0; i<mines; i++) board[Math.floor(Math.random()*size)][Math.floor(Math.random()*size)] = -1;
            render();
        }
        
        function render() {
            grid.innerHTML = '';
            for(let r=0; r<size; r++) {
                for(let c=0; c<size; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.onclick = () => reveal(r, c, cell);
                    grid.appendChild(cell);
                }
            }
        }
        
        function reveal(r, c, el) {
            if(el.classList.contains('revealed')) return;
            el.classList.add('revealed');
            if(board[r][c] === -1) { el.classList.add('mine'); el.textContent = '💣'; }
            else {
                let count = 0;
                for(let i=-1; i<=1; i++) for(let j=-1; j<=1; j++) if(board[r+i]?.[c+j] === -1) count++;
                if(count > 0) el.textContent = count;
            }
        }
        init();
    </script>
</body>
</html>
