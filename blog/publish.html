<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publish Post | lunarHope</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.19.0/dist/index.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    body { background-color: #010409; color: #c9d1d9; font-family: 'Inter', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    .text-gradient {
      background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .terminal {
      background: rgba(13, 17, 23, 0.95);
      border: 1px solid #30363d;
      border-radius: 12px;
      overflow: hidden;
    }
    .terminal-header {
      background: #161b22;
      padding: 12px 16px;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .terminal-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
    }
    .terminal-body { padding: 20px; }
    .input-field {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 14px;
      color: #c9d1d9;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    .input-field:focus {
      outline: none;
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
    }
    textarea.input-field { min-height: 300px; resize: vertical; }
    .btn-primary {
      background: linear-gradient(135deg, #238636 0%, #2ea043 100%);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.2s;
      border: none;
      cursor: pointer;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(35, 134, 54, 0.3); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .status-line {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      padding: 4px 0;
    }
    .status-ok { color: #3fb950; }
    .status-err { color: #f85149; }
    .status-info { color: #58a6ff; }
    .status-warn { color: #d29922; }
  </style>
</head>
<body class="min-h-screen">
  <!-- Navigation -->
  <nav class="fixed top-0 left-0 right-0 z-40 backdrop-blur-md bg-[#010409]/80 border-b border-[#30363d]">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="/" class="text-xl font-bold text-gradient">lunarHope</a>
      <div class="flex gap-6 text-sm">
        <a href="/" class="text-space-muted hover:text-space-text transition">Home</a>
        <a href="/blog" class="text-space-muted hover:text-space-text transition">Blog</a>
        <a href="/tools" class="text-space-muted hover:text-space-text transition">Tools</a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-4xl mx-auto px-6 pt-32 pb-20">
    <div class="mb-8">
      <h1 class="text-4xl font-bold mb-3 text-gradient">Publish New Post</h1>
      <p class="text-space-muted font-mono">// write your thoughts, publish to GitHub</p>
    </div>

    <div class="terminal">
      <div class="terminal-header">
        <div class="terminal-dot" style="background:#ff5f56"></div>
        <div class="terminal-dot" style="background:#ffbd2e"></div>
        <div class="terminal-dot" style="background:#27c93f"></div>
        <span class="ml-4 text-sm text-space-muted font-mono">publish.sh</span>
      </div>
      <div class="terminal-body space-y-5">
        <div>
          <label class="block text-sm text-space-muted mb-2 font-mono">$ TITLE</label>
          <input type="text" id="title" class="input-field" placeholder="My awesome post title">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-space-muted mb-2 font-mono">$ DATE</label>
            <input type="date" id="date" class="input-field">
          </div>
          <div>
            <label class="block text-sm text-space-muted mb-2 font-mono">$ TAGS (comma separated)</label>
            <input type="text" id="tags" class="input-field" placeholder="life, tech, thoughts">
          </div>
        </div>

        <div>
          <label class="block text-sm text-space-muted mb-2 font-mono">$ CONTENT (Markdown)</label>
          <textarea id="content" class="input-field" placeholder="# Hello World&#10;&#10;Write your post here..."></textarea>
        </div>

        <div>
          <label class="block text-sm text-space-muted mb-2 font-mono">$ GITHUB_TOKEN</label>
          <input type="password" id="token" class="input-field" placeholder="ghp_xxxxxxxxxxxx">
          <p class="text-xs text-space-muted mt-2 font-mono">Requires repo scope. Stored only in memory.</p>
        </div>

        <div class="flex items-center gap-4 pt-4">
          <button id="publish-btn" class="btn-primary">🚀 Publish</button>
          <a href="/blog" class="text-space-muted hover:text-space-text text-sm font-mono">← Back to blog</a>
        </div>

        <div id="status-log" class="mt-6 pt-6 border-t border-[#30363d] hidden">
          <div class="text-xs text-space-muted mb-3 font-mono">--- Output ---</div>
          <div id="log-content" class="space-y-1"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="/assets/js/lunar-cache.js"></script>
  <script>
    const REPO_OWNER = 'WJULY42';
    const REPO_NAME = 'WJULY42.github.io';
    const BRANCH = 'main';

    // Set default date to today
    document.getElementById('date').valueAsDate = new Date();

    function log(msg, type = 'info') {
      const logEl = document.getElementById('log-content');
      const statusEl = document.getElementById('status-log');
      statusEl.classList.remove('hidden');
      const line = document.createElement('div');
      line.className = `status-line status-${type}`;
      line.textContent = `> ${msg}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function toSlug(title) {
      const pinyin = window.pinyinPro.pinyin(title, { toneType: 'none', type: 'array' }).join('-').toLowerCase();
      return pinyin.replace(/[^a-z0-9-]/g, '').replace(/-+/g, '-').replace(/^-|-$/g, '');
    }

    function utf8ToBase64(str) {
      return btoa(unescape(encodeURIComponent(str)));
    }

    async function getFileSha(path, token) {
      try {
        const res = await LunarCache.safeGitHubRequest(
          `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}?ref=${BRANCH}`,
          { headers: { Authorization: `Bearer ${token}` } }
        );
        if (res.status === 404) return null;
        if (!res.ok) throw new Error(`Failed to get file: ${res.status}`);
        const data = await res.json();
        return data.sha;
      } catch (err) {
        if (err.message.includes('404')) return null;
        throw err;
      }
    }

    async function publish() {
      const title = document.getElementById('title').value.trim();
      const date = document.getElementById('date').value;
      const tagsRaw = document.getElementById('tags').value.trim();
      const content = document.getElementById('content').value;
      const token = document.getElementById('token').value.trim();
      const btn = document.getElementById('publish-btn');

      if (!title || !date || !content || !token) {
        log('Missing required fields', 'err');
        return;
      }

      btn.disabled = true;
      btn.textContent = '⏳ Publishing...';

      try {
        log('Starting publish process...', 'info');

        // Check rate limit first
        if (LunarCache.isRateLimited()) {
          const info = LunarCache.getRateLimitInfo();
          const resetMin = Math.ceil((info.reset - Date.now()) / 60000);
          throw new Error(`GitHub API 配额已用尽，请 ${resetMin} 分钟后重试`);
        }

        const slug = toSlug(title);
        log(`Generated slug: ${slug}`, 'info');

        const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

        const frontmatter = `---\ntitle: "${title}"\ndate: "${date}"\ntags: [${tags.map(t => `"${t}"`).join(', ')}]\n---\n\n`;
        const mdContent = frontmatter + content;
        const mdPath = `blog/posts/${slug}.html`;

        // Step 1: Create markdown file
        log('Creating markdown file...', 'info');
        const mdSha = await getFileSha(mdPath, token);
        const mdBody = {
          message: `blog: add post "${title}"`,
          content: utf8ToBase64(mdContent),
          branch: BRANCH
        };
        if (mdSha) mdBody.sha = mdSha;

        const mdRes = await LunarCache.safeGitHubRequest(
          `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${mdPath}`,
          {
            method: 'PUT',
            headers: {
              Authorization: `Bearer ${token}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(mdBody)
          }
        );
        if (!mdRes.ok) {
          const errData = await mdRes.json();
          throw new Error(`Failed to create MD: ${errData.message}`);
        }
        log('✓ Markdown file created', 'ok');

        // Step 2: Update posts.json
        log('Updating posts index...', 'info');
        const jsonPath = 'data/posts.json';
        const jsonSha = await getFileSha(jsonPath, token);

        let posts = [];
        if (jsonSha) {
          const jsonRes = await LunarCache.safeGitHubRequest(
            `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${jsonPath}?ref=${BRANCH}`,
            { headers: { Authorization: `Bearer ${token}` } }
          );
          const jsonData = await jsonRes.json();
          posts = JSON.parse(atob(jsonData.content));
        }

        const newPost = {
          title,
          date,
          tags,
          slug,
          url: `/blog/posts/${slug}.html`,
          desc: content.split('\n').find(l => l.trim() && !l.startsWith('#')) || ''
        };

        posts = posts.filter(p => p.slug !== slug);
        posts.unshift(newPost);

        const jsonBody = {
          message: `blog: update posts index`,
          content: utf8ToBase64(JSON.stringify(posts, null, 2)),
          sha: jsonSha,
          branch: BRANCH
        };

        const jsonRes = await LunarCache.safeGitHubRequest(
          `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${jsonPath}`,
          {
            method: 'PUT',
            headers: {
              Authorization: `Bearer ${token}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(jsonBody)
          }
        );
        if (!jsonRes.ok) {
          const errData = await jsonRes.json();
          throw new Error(`Failed to update index: ${errData.message}`);
        }
        log('✓ Posts index updated', 'ok');

        // Clear cache to force refresh on next visit
        LunarCache.clear('blog_posts');

        log('🎉 Published successfully!', 'ok');
        setTimeout(() => {
          window.location.href = `/blog/posts/${slug}.html`;
        }, 1500);

      } catch (err) {
        log(`Error: ${err.message}`, 'err');
        btn.disabled = false;
        btn.textContent = '🚀 Publish';
      }
    }

    document.getElementById('publish-btn').addEventListener('click', publish);
  </script>
</body>
</html>
