<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publish Post | lunarHope</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        space: { 900: '#010409', 800: '#0d1117', 700: '#161b22', 600: '#21262d', border: '#30363d', text: '#f0f6fc', muted: '#8b949e' },
                        glow: { green: '#3fb950', blue: '#58a6ff', pink: '#da3633' }
                    },
                    fontFamily: { mono: ['"JetBrains Mono"', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #010409; color: #f0f6fc; }
        textarea { resize: none; }
        .terminal-cursor::after { content: '_'; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="font-mono min-h-screen flex flex-col">

    <header class="border-b border-space-border bg-space-900/80 backdrop-blur px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <a href="/blog/" class="text-space-text hover:text-glow-blue transition">&lt; Back to Blog</a>
        <h1 class="text-glow-green font-bold">New Post Terminal</h1>
    </header>

    <main class="flex-grow max-w-5xl mx-auto w-full p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Left: Form -->
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-space-800 border border-space-border rounded-lg p-6 shadow-lg">
                <label class="block text-sm text-space-muted mb-2">Title (Slug will be auto-generated)</label>
                <input type="text" id="post-title" class="w-full bg-space-900 border border-space-border rounded p-3 text-space-text focus:border-glow-blue outline-none transition" placeholder="e.g., My First Post">
                
                <div class="grid grid-cols-2 gap-4 mt-4">
                    <div>
                        <label class="block text-sm text-space-muted mb-2">Date</label>
                        <input type="date" id="post-date" class="w-full bg-space-900 border border-space-border rounded p-3 text-space-text focus:border-glow-blue outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-space-muted mb-2">Tags (comma separated)</label>
                        <input type="text" id="post-tags" class="w-full bg-space-900 border border-space-border rounded p-3 text-space-text focus:border-glow-blue outline-none" placeholder="tech, life, code">
                    </div>
                </div>

                <label class="block text-sm text-space-muted mt-4 mb-2">Content (Markdown)</label>
                <textarea id="post-content" rows="15" class="w-full bg-space-900 border border-space-border rounded p-4 text-space-text focus:border-glow-blue outline-none transition font-mono text-sm" placeholder="# Hello World..."></textarea>
            </div>
        </div>

        <!-- Right: Config & Action -->
        <div class="space-y-6">
            <div class="bg-space-800 border border-space-border rounded-lg p-6 shadow-lg">
                <h3 class="text-glow-blue font-bold mb-4 flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    GitHub Config
                </h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-space-muted mb-1">Personal Access Token</label>
                        <input type="password" id="gh-token" class="w-full bg-space-900 border border-space-border rounded p-2 text-xs text-space-text focus:border-glow-green outline-none" placeholder="ghp_xxxxxxxxxxxx">
                        <p class="text-[10px] text-space-muted mt-1">Token needs 'repo' scope. Stored only in memory.</p>
                    </div>
                    <button onclick="publishPost()" class="w-full bg-glow-green/20 text-glow-green border border-glow-green/50 hover:bg-glow-green/30 py-3 rounded font-bold transition flex items-center justify-center">
                        <span id="btn-text">git push origin main</span>
                    </button>
                </div>
            </div>

            <!-- Terminal Output -->
            <div class="bg-black border border-space-border rounded-lg p-4 h-64 overflow-y-auto font-mono text-xs text-gray-400" id="terminal-log">
                <p class="text-glow-green">➜  ~  Ready to publish.</p>
            </div>
        </div>
    </main>

    <script>
        // Auto-generate slug from title
        document.getElementById('post-title').addEventListener('input', (e) => {
            const slug = e.target.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
            // You can show this slug somewhere if you want
        });

        // Set today's date by default
        document.getElementById('post-date').valueAsDate = new Date();

        function log(msg, type = 'info') {
            const term = document.getElementById('terminal-log');
            const p = document.createElement('p');
            p.className = type === 'error' ? 'text-glow-pink' : (type === 'success' ? 'text-glow-green' : 'text-gray-400');
            p.textContent = `> ${msg}`;
            term.appendChild(p);
            term.scrollTop = term.scrollHeight;
        }

        async function publishPost() {
            const token = document.getElementById('gh-token').value;
            const title = document.getElementById('post-title').value;
            const date = document.getElementById('post-date').value;
            const tags = document.getElementById('post-tags').value.split(',').map(t => t.trim()).filter(t => t);
            const content = document.getElementById('post-content').value;

            if (!token || !title || !content) {
                log('Error: Missing Title, Content or Token.', 'error');
                return;
            }

            const btn = document.querySelector('button');
            const btnText = document.getElementById('btn-text');
            btn.disabled = true;
            btnText.textContent = 'Pushing...';
            log('Initializing git push sequence...', 'info');

            const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
            const fileName = `${slug}.md`;
            const path = `blog/posts/${fileName}`;
            
            // Construct Markdown Frontmatter
            const frontmatter = `---\ntitle: ${title}\ndate: ${date}\ntags: [${tags.join(', ')}]\n---\n\n`;
            const fileContent = frontmatter + content;
            const encodedContent = btoa(unescape(encodeURIComponent(fileContent)));

            try {
                // 1. Check if file exists to get SHA (for update) or create new
                let sha = null;
                try {
                    const checkRes = await fetch(`https://api.github.com/repos/WJULY42/WJULY42.github.io/contents/${path}`, {
                        headers: { Authorization: `token ${token}` }
                    });
                    if (checkRes.ok) {
                        const data = await checkRes.json();
                        sha = data.sha;
                        log(`File exists. Updating SHA: ${sha.substring(0, 7)}...`, 'info');
                    }
                } catch (e) { /* File doesn't exist, proceed to create */ }

                // 2. Put file
                const payload = {
                    message: `feat: publish new post "${title}"`,
                    content: encodedContent,
                    branch: 'main'
                };
                if (sha) payload.sha = sha;

                const putRes = await fetch(`https://api.github.com/repos/WJULY42/WJULY42.github.io/contents/${path}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!putRes.ok) {
                    const err = await putRes.json();
                    throw new Error(err.message);
                }

                log('Commit successful! File pushed to blog/posts/', 'success');
                log('Note: Remember to update /data/posts.json manually or via your build script.', 'info');
                
                // Optional: Redirect back to blog
                setTimeout(() => {
                    if(confirm('Post published! Go back to blog list?')) {
                        window.location.href = '/blog/';
                    }
                }, 1000);

            } catch (err) {
                log(`Push failed: ${err.message}`, 'error');
            } finally {
                btn.disabled = false;
                btnText.textContent = 'git push origin main';
            }
        }
    </script>
</body>
</html>
