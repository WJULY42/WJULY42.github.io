<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAN | 博客与工具</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <nav>
        <a href="/">🏠 首页</a>
        <a href="blog/">📝 博客</a>
        <a href="tools/">🛠️ 工具</a>
    </nav>

    <div class="card">
        <h1>👋 你好，我是 LAN</h1>
        <p>这里是我写技术笔记、折腾各种小工具的地方。所有内容完全免费，欢迎随意使用。</p>
        <a href="blog/" class="btn">📖 阅读博客</a>
        <a href="tools/" class="btn" style="background: #475569; margin-left: 0.5rem;">🎮 试试工具</a>
    </div>

    <div class="card">
        <h2>✨ 最新文章</h2>
        <div id="latestPosts"></div>
    </div>

    <!-- 评论区 -->
    <div class="card">
        <h2>💬 留言板</h2>
        <p>欢迎在下方留言交流～ 使用 GitHub 账号登录即可评论。</p>
        <script src="https://giscus.app/client.js"
                data-repo="WJULY42/WJULY42.github.io"
                data-repo-id="R_kgDOSAaoqA"
                data-category="Announcements"
                data-category-id="DIC_kwDOSAaoqM4C6qzS"
                data-mapping="pathname"
                data-strict="0"
                data-reactions-enabled="1"
                data-emit-metadata="0"
                data-input-position="bottom"
                data-theme="preferred_color_scheme"
                data-lang="zh-CN"
                crossorigin="anonymous"
                async>
        </script>
    </div>
</div>

<script>
    async function loadLatestPosts() {
        try {
            const response = await fetch('data/posts.json');
            const data = await response.json();
            const posts = data.posts;
            const sorted = posts.sort((a,b) => new Date(b.date) - new Date(a.date));
            const latest = sorted.slice(0, 3);
            const container = document.getElementById('latestPosts');
            container.innerHTML = '';
            latest.forEach(post => {
                const postDiv = document.createElement('div');
                postDiv.className = 'post-item';
                postDiv.style.borderBottom = 'none';
                postDiv.style.paddingBottom = '0';
                postDiv.innerHTML = `
                    <div class="post-title"><a href="${post.url}">${post.title}</a></div>
                    <div class="post-meta">📅 ${post.date}</div>
                    <div class="post-excerpt">${post.excerpt}</div>
                `;
                container.appendChild(postDiv);
            });
        } catch (err) {
            document.getElementById('latestPosts').innerHTML = '<p>暂无文章</p>';
        }
    }
    loadLatestPosts();
</script>
</body>
</html>
