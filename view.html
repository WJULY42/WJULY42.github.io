<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading... | lunarHope</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Markdown 渲染依赖（仅文章模式使用） -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        space: { 900: '#010409', 800: '#0d1117', 700: '#161b22', 600: '#21262d', border: '#30363d', text: '#f0f6fc', muted: '#8b949e' },
                        glow: { purple: '#8957e5', blue: '#58a6ff', pink: '#da3633', green: '#3fb950' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #010409; color: #f0f6fc; }
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: #010409; } ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        
        /* 阅读进度条（仅文章模式） */
        #progress-bar { position: fixed; top: 0; left: 0; height: 2px; background: linear-gradient(90deg, #58a6ff, #8957e5, #da3633); z-index: 100; transition: width 0.1s ease-out; }

        /* Markdown 排版 (GitHub Dark) */
        .markdown-body { color: #f0f6fc; line-height: 1.7; font-size: 16px; }
        .markdown-body h1, .markdown-body h2 { border-bottom: 1px solid #30363d; padding-bottom: 0.3em; margin-top: 2em; margin-bottom: 1em; font-weight: 600; }
        .markdown-body h1 { font-size: 2em; }
        .markdown-body h2 { font-size: 1.5em; }
        .markdown-body h3 { font-size: 1.25em; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 600; }
        .markdown-body p { margin-bottom: 1.2em; }
        .markdown-body a { color: #58a6ff; text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
        .markdown-body a:hover { border-bottom-color: #58a6ff; }
        .markdown-body strong { color: #ffffff; font-weight: 600; }
        .markdown-body blockquote { border-left: 4px solid #8957e5; padding: 0.5em 1em; margin: 1.5em 0; background: #161b22; color: #8b949e; border-radius: 0 6px 6px 0; }
        .markdown-body ul, .markdown-body ol { padding-left: 2em; margin-bottom: 1.2em; }
        .markdown-body li { margin-bottom: 0.5em; }
        .markdown-body code { background: #161b22; padding: 0.2em 0.4em; border-radius: 6px; font-size: 85%; color: #f0f6fc; font-family: 'JetBrains Mono', monospace; border: 1px solid #30363d; }
        .markdown-body pre { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 16px; overflow: auto; margin: 1.5em 0; position: relative; }
        .markdown-body pre code { background: transparent; padding: 0; border: none; color: #f0f6fc; font-size: 14px; line-height: 1.5; }
        .markdown-body img { max-width: 100%; border-radius: 6px; border: 1px solid #30363d; cursor: zoom-in; transition: transform 0.2s; }
        .markdown-body img:hover { transform: scale(1.01); }
        .markdown-body table { border-collapse: collapse; width: 100%; margin: 1.5em 0; }
        .markdown-body table th, .markdown-body table td { border: 1px solid #30363d; padding: 8px 13px; }
        .markdown-body table th { background: #161b22; font-weight: 600; }
        .markdown-body table tr { background: #0d1117; border-top: 1px solid #30363d; }
        .markdown-body hr { border: none; border-top: 1px solid #30363d; margin: 2em 0; }

        /* 代码复制按钮 */
        .copy-btn { position: absolute; top: 8px; right: 8px; padding: 4px 8px; font-size: 12px; background: #21262d; color: #8b949e; border: 1px solid #30363d; border-radius: 4px; cursor: pointer; opacity: 0; transition: opacity 0.2s; }
        .markdown-body pre:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { background: #30363d; color: #f0f6fc; }

        /* Iframe 全屏 */
        #iframe-container:fullscreen { padding: 0; border-radius: 0; border: none; height: 100vh; width: 100vw; }
        #iframe-container:fullscreen .window-header { display: none; }
        #iframe-container:fullscreen .iframe-wrapper { border-radius: 0; border: none; }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col">

    <!-- 阅读进度条（仅文章模式显示） -->
    <div id="progress-bar" style="width: 0%; display: none;"></div>

    <!-- 顶部导航 -->
    <header class="sticky top-0 z-50 bg-space-900/80 backdrop-blur-md border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a id="back-link" href="/" class="flex items-center text-space-muted hover:text-space-text transition font-mono text-sm">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                <span id="back-text">Back</span>
            </a>
            <span class="text-xs text-space-muted font-mono hidden md:block" id="header-path">loading...</span>
        </div>
    </header>

    <!-- 主体内容 -->
    <main class="flex-grow max-w-7xl mx-auto w-full px-6 py-8 grid grid-cols-1 lg:grid-cols-4 gap-8">
        
        <!-- 左侧：内容区 -->
        <div class="lg:col-span-3 min-w-0">
            
            <!-- ===== 文章模式容器 ===== -->
            <article id="post-view" class="hidden">
                <header class="mb-12 border-b border-space-border pb-8">
                    <h1 id="post-title" class="text-4xl md:text-5xl font-bold text-space-text mb-4 leading-tight">Loading...</h1>
                    <div class="flex flex-wrap items-center gap-4 text-sm text-space-muted">
                        <span id="post-date" class="font-mono flex items-center">
                            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            Date
                        </span>
                        <div id="post-tags" class="flex gap-2"></div>
                    </div>
                </header>
                <div id="markdown-content" class="markdown-body">
                    <p class="text-space-muted font-mono">Fetching content...</p>
                </div>
                <section class="mt-20 pt-10 border-t border-space-border">
                    <h3 class="text-xl font-bold text-space-text mb-6 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-glow-purple" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                        Discussion
                    </h3>
                    <div class="bg-space-800 border border-space-border rounded-xl p-6 min-h-[200px]">
                        <script src="https://giscus.app/client.js"
                                data-repo="WJULY42/WJULY42.github.io"
                                data-repo-id="YOUR_REPO_ID"
                                data-category="Announcements"
                                data-category-id="YOUR_CATEGORY_ID"
                                data-mapping="pathname"
                                data-strict="0"
                                data-reactions-enabled="1"
                                data-emit-metadata="0"
                                data-input-position="bottom"
                                data-theme="dark"
                                data-lang="zh-CN"
                                crossorigin="anonymous"
                                async>
                        </script>
                    </div>
                </section>
            </article>

            <!-- ===== 工具模式容器 ===== -->
            <div id="tool-view" class="hidden h-full flex flex-col" style="min-height: 70vh;">
                <div id="iframe-container" class="flex flex-col flex-grow">
                    <div class="window-header bg-space-700 px-4 py-2.5 border border-space-border rounded-t-xl flex items-center justify-between select-none">
                        <div class="flex space-x-2">
                            <div class="w-3 h-3 rounded-full bg-red-500"></div>
                            <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                            <div class="w-3 h-3 rounded-full bg-green-500"></div>
                        </div>
                        <span class="text-xs text-space-muted font-mono" id="window-title">loading...</span>
                        <button onclick="toggleFullscreen()" class="text-space-muted hover:text-space-text transition p-1" title="Toggle Fullscreen">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                        </button>
                    </div>
                    <div class="iframe-wrapper flex-grow border border-t-0 border-space-border rounded-b-xl overflow-hidden bg-white relative shadow-2xl">
                        <iframe id="tool-iframe" class="w-full h-full absolute inset-0" src="" frameborder="0"></iframe>
                    </div>
                </div>
            </div>

            <!-- ===== 错误提示 ===== -->
            <div id="error-view" class="hidden text-center py-20">
                <p class="text-glow-pink font-mono text-xl mb-2">404 - Content Not Found</p>
                <p id="error-msg" class="text-space-muted"></p>
            </div>
        </div>

        <!-- 右侧：侧边栏 -->
        <aside class="lg:col-span-1">
            <div class="sticky top-24 space-y-6">
                
                <!-- 文章模式侧边栏 -->
                <div id="post-sidebar" class="hidden space-y-6">
                    <div>
                        <h4 class="text-xs font-bold text-space-muted uppercase tracking-wider mb-4 flex items-center">
                            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
                            Contents
                        </h4>
                        <nav id="toc-list" class="space-y-1 border-l border-space-border pl-4"></nav>
                    </div>
                    <div class="border-t border-space-border pt-6 space-y-2">
                        <h4 class="text-xs font-bold text-space-muted uppercase tracking-wider mb-3">Actions</h4>
                        <button onclick="editCurrent()" class="w-full flex items-center justify-between px-3 py-2 bg-space-800 hover:bg-space-700 border border-space-border rounded-md text-sm text-space-text transition">
                            <span class="flex items-center">
                                <svg class="w-4 h-4 mr-2 text-glow-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                Edit
                            </span>
                            <span class="text-xs text-space-muted">✏️</span>
                        </button>
                        <button onclick="deleteCurrent()" class="w-full flex items-center justify-between px-3 py-2 bg-space-800 hover:bg-glow-pink/10 border border-space-border hover:border-glow-pink/50 rounded-md text-sm text-space-text hover:text-glow-pink transition">
                            <span class="flex items-center">
                                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                Delete
                            </span>
                            <span class="text-xs text-space-muted">🗑️</span>
                        </button>
                    </div>
                </div>

                <!-- 工具模式侧边栏 -->
                <div id="tool-sidebar" class="hidden bg-space-800 border border-space-border rounded-xl p-6 space-y-6">
                    <div class="text-center space-y-3">
                        <div id="tool-emoji" class="text-6xl mb-2">🛠️</div>
                        <h2 id="tool-name" class="text-2xl font-bold text-space-text">Tool Name</h2>
                        <p id="tool-desc" class="text-sm text-space-muted leading-relaxed">Description goes here.</p>
                    </div>
                    <div class="border-t border-space-border pt-6 space-y-3">
                        <h4 class="text-xs font-bold text-space-muted uppercase tracking-wider">Actions</h4>
                        <a id="open-new-tab" href="#" target="_blank" class="block w-full text-center py-2 bg-space-700 hover:bg-space-600 border border-space-border rounded-md text-sm text-space-text transition">
                            Open in New Tab
                        </a>
                        <button onclick="toggleFullscreen()" class="block w-full text-center py-2 bg-glow-blue/10 hover:bg-glow-blue/20 border border-glow-blue/50 rounded-md text-sm text-glow-blue transition">
                            Enter Fullscreen
                        </button>
                        <button onclick="editCurrent()" class="block w-full text-center py-2 bg-space-700 hover:bg-space-600 border border-space-border rounded-md text-sm text-space-text transition">
                            ✏️ Edit Source
                        </button>
                        <button onclick="deleteCurrent()" class="block w-full text-center py-2 bg-glow-pink/10 hover:bg-glow-pink/20 border border-glow-pink/50 rounded-md text-sm text-glow-pink transition">
                            🗑️ Delete Tool
                        </button>
                    </div>
                    <div class="border-t border-space-border pt-6">
                        <p class="text-[10px] text-space-muted text-center font-mono">Powered by lunarHope OS</p>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <script>
        // ==================== 路由解析 ====================
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        const appParam = params.get('app');    // 工具模式
        const slugParam = params.get('slug');  // 文章模式

        // 兼容旧 URL（use.html?app=xxx 和 read.html?slug=xxx）
        if (!type) {
            if (appParam) {
                window.location.replace(`/view.html?type=tool&app=${encodeURIComponent(appParam)}`);
            } else if (slugParam) {
                window.location.replace(`/view.html?type=post&slug=${encodeURIComponent(slugParam)}`);
            }
        }

        // 自动读取 URL 中的 token（从 read/use 跳转过来时）
        const _tokenParam = params.get('_token');
        if (_tokenParam) localStorage.setItem('gh_token', decodeURIComponent(_tokenParam));

        // ==================== 初始化 ====================
        if (type === 'tool' && appParam) {
            initTool(appParam);
        } else if (type === 'post' && slugParam) {
            initPost(slugParam);
        } else {
            showError('Missing or invalid parameters. Expected ?type=tool&app=xxx or ?type=post&slug=xxx');
        }

        // ==================== 工具模式 ====================
        async function initTool(appUrl) {
            document.getElementById('tool-view').classList.remove('hidden');
            document.getElementById('tool-sidebar').classList.remove('hidden');
            document.getElementById('back-link').href = '/tools/';
            document.getElementById('back-text').textContent = 'Back to Workbench';
            document.getElementById('header-path').textContent = `~/tools/${appUrl}`;

            const iframe = document.getElementById('tool-iframe');
            const windowTitle = document.getElementById('window-title');
            const openNewTab = document.getElementById('open-new-tab');
            
            const fullUrl = `/tools/${appUrl}`;
            iframe.src = fullUrl;
            windowTitle.textContent = `app://${appUrl}`;
            openNewTab.href = fullUrl;

            try {
                const res = await fetch('/data/tools.json?t=' + Date.now());
                const data = await res.json();
                const tools = Array.isArray(data) ? data : (data.tools || []);
                const tool = tools.find(t => t.url === appUrl);
                
                if (tool) {
                    document.getElementById('tool-emoji').textContent = tool.emoji || '🛠️';
                    document.getElementById('tool-name').textContent = tool.name;
                    document.getElementById('tool-desc').textContent = tool.desc;
                    document.title = `${tool.name} | lunarHope Tools`;
                } else {
                    document.getElementById('tool-name').textContent = appUrl.replace('.html', '');
                    document.title = `${appUrl} | lunarHope Tools`;
                }
            } catch (e) {
                console.error('Failed to load tool metadata', e);
            }
        }

        // ==================== 文章模式 ====================
        async function initPost(slug) {
            document.getElementById('post-view').classList.remove('hidden');
            document.getElementById('post-sidebar').classList.remove('hidden');
            document.getElementById('progress-bar').style.display = 'block';
            document.getElementById('back-link').href = '/blog/';
            document.getElementById('back-text').textContent = 'Back to Blog';
            document.getElementById('header-path').textContent = `~/blog/posts/${slug}.md`;

            const contentEl = document.getElementById('markdown-content');
            const titleEl = document.getElementById('post-title');
            const dateEl = document.getElementById('post-date');
            const tagsEl = document.getElementById('post-tags');

            try {
                const res = await fetch(`/blog/posts/${slug}.md?t=${Date.now()}`);
                if (!res.ok) throw new Error('Article not found');
                const mdText = await res.text();

                const fmMatch = mdText.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
                let rawMd = mdText;
                let meta = {};

                if (fmMatch) {
                    fmMatch[1].split('\n').forEach(line => {
                        const m = line.match(/^(\w+):\s*(.+)$/);
                        if (m) {
                            let val = m[2].trim().replace(/^["']|["']$/g, '');
                            if (m[1] === 'tags') {
                                val = val.replace(/[\[\]]/g, '').split(',').map(t => t.trim()).filter(t => t);
                            }
                            meta[m[1]] = val;
                        }
                    });
                    rawMd = fmMatch[2];
                }

                const title = meta.title || slug;
                titleEl.textContent = title;
                document.title = `${title} | lunarHope`;
                dateEl.innerHTML = `<svg class="w-4 h-4 mr-1 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path> ${meta.date || 'Unknown'}`;
                
                if (meta.tags && Array.isArray(meta.tags)) {
                    tagsEl.innerHTML = meta.tags.map(t => `<span class="px-2 py-0.5 rounded-full text-xs bg-blue-900/30 text-blue-400 border border-blue-800/50">${t}</span>`).join('');
                }

                contentEl.innerHTML = marked.parse(rawMd);
                postProcessMarkdown();

            } catch (err) {
                showError(`The post "${slug}.md" does not exist.`);
            }
        }

        function postProcessMarkdown() {
            document.querySelectorAll('.markdown-body pre code').forEach(block => hljs.highlightElement(block));

            document.querySelectorAll('.markdown-body pre').forEach(pre => {
                const btn = document.createElement('button');
                btn.innerText = 'Copy';
                btn.className = 'copy-btn';
                pre.appendChild(btn);
                btn.onclick = () => {
                    navigator.clipboard.writeText(pre.querySelector('code').innerText).then(() => {
                        btn.innerText = 'Copied!';
                        setTimeout(() => btn.innerText = 'Copy', 2000);
                    });
                };
            });

            document.querySelectorAll('.markdown-body img').forEach(img => {
                img.addEventListener('click', () => {
                    const overlay = document.createElement('div');
                    overlay.className = 'fixed inset-0 z-[200] bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 cursor-zoom-out';
                    overlay.innerHTML = `<img src="${img.src}" class="max-w-full max-h-full rounded-lg shadow-2xl border border-space-border">`;
                    overlay.onclick = () => document.body.removeChild(overlay);
                    document.body.appendChild(overlay);
                });
            });

            const tocList = document.getElementById('toc-list');
            const headings = document.querySelectorAll('.markdown-body h1, .markdown-body h2, .markdown-body h3');
            headings.forEach((h, i) => {
                const id = 'heading-' + i;
                h.id = id;
                const link = document.createElement('a');
                link.href = '#' + id;
                link.textContent = h.textContent;
                link.className = 'block text-sm text-space-muted hover:text-space-text py-1 transition truncate';
                if (h.tagName === 'H2') link.classList.add('pl-2');
                if (h.tagName === 'H3') link.classList.add('pl-4', 'text-xs');
                tocList.appendChild(link);
            });
        }

        // ==================== 通用功能 ====================
        function showError(msg) {
            document.getElementById('error-view').classList.remove('hidden');
            document.getElementById('error-msg').textContent = msg;
        }

        function toggleFullscreen() {
            const container = document.getElementById('iframe-container');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => console.error(err));
            } else {
                document.exitFullscreen();
            }
        }

        // 阅读进度条
        window.addEventListener('scroll', () => {
            if (type !== 'post') return;
            const h = document.documentElement;
            const b = document.body;
            const st = 'scrollTop';
            const sh = 'scrollHeight';
            const percent = (h[st] || b[st]) / ((h[sh] || b[sh]) - h.clientHeight) * 100;
            document.getElementById('progress-bar').style.width = percent + '%';
        });

        // ==================== 编辑/删除 ====================
        function editCurrent() {
            const token = localStorage.getItem('gh_token');
            let url = '';
            if (type === 'post') {
                url = `/publish.html?edit=${slugParam}&type=post`;
            } else {
                const slug = appParam.replace('.html', '');
                url = `/publish.html?edit=${slug}&type=tool`;
            }
            if (token) url += `&_token=${encodeURIComponent(token)}`;
            window.location.href = url;
        }

        async function deleteCurrent() {
            const token = localStorage.getItem('gh_token');
            if (!token) {
                alert('Please set your GitHub Token in /publish.html first.');
                window.location.href = '/publish.html';
                return;
            }

            const isPost = type === 'post';
            const targetName = isPost ? slugParam : appParam;
            const filePath = isPost ? `blog/posts/${slugParam}.md` : `tools/${appParam}`;
            const jsonPath = isPost ? 'data/posts.json' : 'data/tools.json';
            const jsonKey = isPost ? 'posts' : 'tools';
            const matchField = isPost ? 'slug' : 'url';

            if (!confirm(`Delete "${targetName}"? This cannot be undone.`)) return;

            try {
                const headers = { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' };
                
                // 1. 删除源文件
                const shaRes = await fetch(`https://api.github.com/repos/WJULY42/WJULY42.github.io/contents/${filePath}`, { headers });
                if (!shaRes.ok) throw new Error('File not found');
                const sha = (await shaRes.json()).sha;

                const delRes = await fetch(`https://api.github.com/repos/WJULY42/WJULY42.github.io/contents/${filePath}`, {
                    method: 'DELETE',
                    headers: { ...headers, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `delete: remove ${isPost ? 'post' : 'tool'} ${targetName}`, sha, branch: 'main' })
                });
                if (!delRes.ok) throw new Error('Delete file failed');

                // 2. 从 JSON 索引移除
                const jsonRes = await fetch(`https://api.github.com/repos/WJULY42/WJULY42.github.io/contents/${jsonPath}`, { headers });
                const jsonData = await jsonRes.json();
                const parsed = JSON.parse(decodeURIComponent(escape(atob(jsonData.content))));
                const list = Array.isArray(parsed) ? parsed : (parsed[jsonKey] || []);
                const newList = list.filter(item => item[matchField] !== (isPost ? slugParam : appParam));

                await fetch(`https://api.github.com/repos/WJULY42/WJULY42.github.io/contents/${jsonPath}`, {
                    method: 'PUT',
                    headers: { ...headers, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `chore: remove ${targetName} from index`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify({ [jsonKey]: newList }, null, 2)))),
                        sha: jsonData.sha,
                        branch: 'main'
                    })
                });

                alert('Deleted successfully!');
                window.location.href = isPost ? '/blog/' : '/tools/';
            } catch (err) {
                alert('Delete failed: ' + err.message);
            }
        }
    </script>
</body>
</html>
